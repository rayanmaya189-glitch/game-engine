{{/*
Secret Template for Game Engine Services
*/}}
---
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: {{ .Values.global.namespace | default "game_engine" }}
  labels:
    {{- include "game-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secrets.database.username | quote }}
  password: {{ .Values.secrets.database.password | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: {{ .Values.global.namespace | default "game_engine" }}
  labels:
    {{- include "game-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.secrets.redis.password | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: {{ .Values.global.namespace | default "game_engine" }}
  labels:
    {{- include "game-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ .Values.secrets.jwt.secret | quote }}
