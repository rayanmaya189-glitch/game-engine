{{/*
Generic Deployment Template for Game Engine Services
*/}}
{{- range $serviceName, $serviceConfig := .Values }}
{{- if and (kindIs "map" $serviceConfig) (hasKey $serviceConfig "enabled") ($serviceConfig.enabled) }}
{{- $servicePorts := $serviceConfig.ports | default dict }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName | kebabcase }}
  namespace: {{ $.Values.global.namespace | default "game_engine" }}
  labels:
    app: {{ $serviceName | kebabcase }}
    version: v1
    component: service
    helm.sh/chart: {{ include "game-engine.chart" $ }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app.kubernetes.io/part-of: casino-gaming-platform
spec:
  replicas: {{ $serviceConfig.replicas | default 2 }}
  selector:
    matchLabels:
      app: {{ $serviceName | kebabcase }}
  template:
    metadata:
      labels:
        app: {{ $serviceName | kebabcase }}
        version: v1
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ ($servicePorts.http | default 8080) | quote }}
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $serviceName | kebabcase }}
          image: "{{ $.Values.global.image.registry }}/{{ $serviceName | kebabcase }}:{{ $.Values.global.image.tag }}"
          imagePullPolicy: {{ $.Values.global.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: {{ $servicePorts.http | default 8080 }}
              protocol: TCP
            - name: grpc
              containerPort: {{ $servicePorts.grpc | default 9090 }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ ($servicePorts.http | default 8080) | quote }}
            - name: GRPC_PORT
              value: {{ ($servicePorts.grpc | default 9090) | quote }}
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: DATABASE_HOST
              value: "postgresql.{{ $.Values.global.namespace }}.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: REDIS_HOST
              value: "redis.{{ $.Values.global.namespace }}.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
          resources:
            {{- toYaml $serviceConfig.resources | nindent 12 }}
          livenessProbe:
            grpc:
              port: {{ $servicePorts.grpc | default 9090 }}
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: {{ $servicePorts.grpc | default 9090 }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
{{- end }}
{{- end }}
