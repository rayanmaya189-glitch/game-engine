# =============================================================================
# Game Engine Helm Values
# =============================================================================
# Default configuration for all services

global:
  image:
    registry: registry.game_engine.local:5000
    tag: latest
    pullPolicy: Always
  namespace: game_engine

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# =============================================================================
# Core Services
# =============================================================================
authService:
  enabled: true
  replicas: 3
  ports:
    http: 8080
    grpc: 9090
    metrics: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 70
    targetMemoryUtilization: 80

userService:
  enabled: true
  replicas: 2
  ports:
    http: 8080
    grpc: 9090
  resources:
    requests:
      cpu: 100m
