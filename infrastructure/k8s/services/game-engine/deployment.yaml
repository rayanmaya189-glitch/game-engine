# =============================================================================
# Game Engine Service Deployment
# =============================================================================
# Core game engine orchestration service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-engine
  namespace: game_engine
  labels:
    app: game-engine
    version: v1
    component: service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-engine
  template:
    metadata:
      labels:
        app: game-engine
        version: v1
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: game-engine
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: game-engine
          image: registry.game_engine.local:5000/game-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GRPC_PORT
              value: "9090"
            - name: DATABASE_HOST
              value: "postgresql.game_engine.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "game_engine_db"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password
            - name: REDIS_HOST
              value: "redis.game_engine.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.game_engine.svc.cluster.local"
            - name: WALLET_SERVICE_URL
              value: "http://wallet-service.game_engine.svc.cluster.local"
            - name: RNG_SERVICE_URL
              value: "http://rng-service.game_engine.svc.cluster.local"
            - name: GAME_REGISTRY_URL
              value: "http://game-registry.game_engine.svc.cluster.local"
            - name: NATS_URL
              value: "nats://nats.game_engine.svc.cluster.local:4222"
            - name: LOG_LEVEL
              value: "info"
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: game-engine-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: game-engine
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: game-engine
  namespace: game_engine
  labels:
    app: game-engine
    component: service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: game-engine

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: game-engine-config
  namespace: game_engine
data:
  config.yaml: |
    server:
      port: 8080
      grpc_port: 9090

    database:
      max_open_conns: 50
      max_idle_conns: 20

    redis:
      pool_size: 20
      ttl: 30

    engine:
      max_concurrent_games: 10000
      game_tick_rate: 60
      state_sync_interval: 100ms
      session_timeout: 300s
      snapshot_interval: 30s

    game_types:
      - slots
      - cards
      - dice
      - table
      - live_dealer
      - sports

    logging:
      format: json
      level: info
