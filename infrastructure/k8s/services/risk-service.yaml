apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-service
  namespace: game-engine
  labels:
    app: risk-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-service
  template:
    metadata:
      labels:
        app: risk-service
        tier: backend
    spec:
      containers:
        - name: risk-service
          image: game-engine/risk-service:latest
          ports:
            - containerPort: 9116
              name: grpc
          env:
            - name: AML_GRPC_HOST
              value: "aml-service"
            - name: AML_GRPC_PORT
              value: "9114"
            - name: FRAUD_GRPC_HOST
              value: "fraud-service"
            - name: FRAUD_GRPC_PORT
              value: "9115"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:9116"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:9116"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: risk-service
  namespace: game-engine
spec:
  selector:
    app: risk-service
  ports:
    - port: 9116
      targetPort: 9116
      name: grpc
  type: ClusterIP
