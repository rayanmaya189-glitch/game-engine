# =============================================================================
# Loyalty Service Deployment
# =============================================================================
# Player loyalty and rewards program service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loyalty-service
  namespace: game_engine
  labels:
    app: loyalty-service
    version: v1
    component: service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loyalty-service
  template:
    metadata:
      labels:
        app: loyalty-service
        version: v1
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: loyalty-service
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: loyalty-service
          image: registry.game_engine.local:5000/loyalty-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GRPC_PORT
              value: "9090"
            - name: DATABASE_HOST
              value: "postgresql.game_engine.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "loyalty_db"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password
            - name: REDIS_HOST
              value: "redis.game_engine.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.game_engine.svc.cluster.local"
            - name: WALLET_SERVICE_URL
              value: "http://wallet-service.game_engine.svc.cluster.local"
            - name: NATS_URL
              value: "nats://nats.game_engine.svc.cluster.local:4222"
            - name: LOG_LEVEL
              value: "info"
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: loyalty-service-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: loyalty-service
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: loyalty-service
  namespace: game_engine
  labels:
    app: loyalty-service
    component: service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: loyalty-service

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loyalty-service-config
  namespace: game_engine
data:
  config.yaml: |
    server:
      port: 8080
      grpc_port: 9090

    database:
      max_open_conns: 25
      max_idle_conns: 10

    redis:
      pool_size: 15
      ttl: 300

    loyalty:
      tiers:
        - name: bronze
          min_points: 0
          multiplier: 1.0
        - name: silver
          min_points: 1000
          multiplier: 1.25
        - name: gold
          min_points: 10000
          multiplier: 1.5
        - name: platinum
          min_points: 50000
          multiplier: 2.0
        - name: diamond
          min_points: 200000
          multiplier: 3.0
      points_expiry_days: 365
      cashback_enabled: true

    logging:
      format: json
      level: info
