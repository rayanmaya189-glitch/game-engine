apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-gateway
  namespace: game-engine
  labels:
    app: websocket-gateway
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-gateway
  template:
    metadata:
      labels:
        app: websocket-gateway
        tier: backend
    spec:
      containers:
        - name: websocket-gateway
          image: game-engine/websocket-gateway:latest
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: game-engine-config
                  key: redis-host
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-gateway
  namespace: game-engine
spec:
  selector:
    app: websocket-gateway
  ports:
    - port: 4000
      targetPort: 4000
      name: http
  type: ClusterIP
