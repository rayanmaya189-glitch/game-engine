apiVersion: apps/v1
kind: Deployment
metadata:
  name: banner-service
  namespace: game-engine
  labels:
    app: banner-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banner-service
  template:
    metadata:
      labels:
        app: banner-service
        tier: backend
    spec:
      containers:
        - name: banner-service
          image: game-engine/banner-service:latest
          ports:
            - containerPort: 9097
              name: grpc
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: game-engine-config
                  key: postgres-host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: game-engine-secrets
                  key: postgres-password
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:9097"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:9097"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: banner-service
  namespace: game-engine
spec:
  selector:
    app: banner-service
  ports:
    - port: 9097
      targetPort: 9097
      name: grpc
  type: ClusterIP
