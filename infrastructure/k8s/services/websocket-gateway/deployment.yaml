---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-gateway
  namespace: game_engine
  labels:
    app: websocket-gateway
    version: v1
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-gateway
  template:
    metadata:
      labels:
        app: websocket-gateway
        version: v1
        component: gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: websocket-gateway
          image: registry.game_engine.local:5000/websocket-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: PORT
              value: "4000"
          resources:
            requests:
              cpu: 125m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-gateway
  namespace: game_engine
  labels:
    app: websocket-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
  selector:
    app: websocket-gateway
