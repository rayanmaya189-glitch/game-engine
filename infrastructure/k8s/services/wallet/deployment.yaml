# =============================================================================
# Wallet Service Deployment
# =============================================================================
# Wallet and payment management service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: game-engine
  labels:
    app: wallet-service
    version: v1
    component: service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
        version: v1
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: wallet-service
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: wallet-service
          image: registry.game-engine.local:5000/wallet-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GRPC_PORT
              value: "9090"
            - name: DATABASE_HOST
              value: "postgresql.game-engine.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "wallet_db"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password
            - name: REDIS_HOST
              value: "redis.game-engine.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            - name: TIMESCALEDB_HOST
              value: "timescaledb.game-engine.svc.cluster.local"
            - name: TIMESCALEDB_PORT
              value: "5432"
            - name: TIMESCALEDB_NAME
              value: "analytics_db"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.game-engine.svc.cluster.local"
            - name: LOG_LEVEL
              value: "info"
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: wallet-service-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: wallet-service
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: game-engine
  labels:
    app: wallet-service
    component: service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: wallet-service

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wallet-service-config
  namespace: game-engine
data:
  config.yaml: |
    server:
      port: 8080
      grpc_port: 9090
      read_timeout: 30s
      write_timeout: 30s

    database:
      max_open_conns: 50
      max_idle_conns: 20
      conn_max_lifetime: 5m

    redis:
      pool_size: 20
      ttl: 60
      lock_timeout: 5s

    timescaledb:
      enabled: true
      batch_size: 1000
      flush_interval: 1s

    wallet:
      supported_currencies:
        - USD
        - EUR
        - GBP
        - THB
        - VND
        - IDR
        - MYR
        - CNY
      min_deposit: 1
      max_deposit: 100000
      min_withdrawal: 10
      max_withdrawal: 50000
      daily_withdrawal_limit: 100000
      monthly_withdrawal_limit: 500000

    bonuses:
      welcome_bonus_enabled: true
      deposit_bonus_enabled: true
      cashback_enabled: true
      wagering_requirements:
        welcome_bonus: 35x
        deposit_bonus: 30x
        cashback: 1x

    transactions:
      auto_confirm: false
      approval_required: true
      fraud_check_enabled: true

    payment_methods:
      - bank_transfer
      - credit_card
      - e_wallet
      - crypto

    rate_limit:
      enabled: true
      requests_per_minute: 60
      burst: 10

    logging:
      format: json
      level: info

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wallet-service
  namespace: game-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wallet-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
