# =============================================================================
# Merchant Service Deployment
# =============================================================================
# Merchant and operator management service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchant-service
  namespace: game_engine
  labels:
    app: merchant-service
    version: v1
    component: service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: merchant-service
  template:
    metadata:
      labels:
        app: merchant-service
        version: v1
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: merchant-service
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: merchant-service
          image: registry.game_engine.local:5000/merchant-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GRPC_PORT
              value: "9090"
            - name: DATABASE_HOST
              value: "postgresql.game_engine.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "merchant_db"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password
            - name: REDIS_HOST
              value: "redis.game_engine.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.game_engine.svc.cluster.local"
            - name: WALLET_SERVICE_URL
              value: "http://wallet-service.game_engine.svc.cluster.local"
            - name: LOG_LEVEL
              value: "info"
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: merchant-service-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: merchant-service
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: merchant-service
  namespace: game_engine
  labels:
    app: merchant-service
    component: service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: merchant-service

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: merchant-service-config
  namespace: game_engine
data:
  config.yaml: |
    server:
      port: 8080
      grpc_port: 9090

    database:
      max_open_conns: 25
      max_idle_conns: 10

    redis:
      pool_size: 10
      ttl: 300

    merchant:
      api_key_expiry: 90d
      webhook_retry_count: 3
      webhook_timeout: 10s
      commission_default_rate: 0.05

    logging:
      format: json
      level: info
