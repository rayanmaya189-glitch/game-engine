---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commission-service
  namespace: game_engine
  labels:
    app: commission-service
    version: v1
    component: service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: commission-service
  template:
    metadata:
      labels:
        app: commission-service
        version: v1
        component: service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: commission-service
          image: registry.game_engine.local:5000/commission-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9015
              protocol: TCP
            - name: grpc
              containerPort: 9115
              protocol: TCP
          env:
            - name: PORT
              value: "9015"
            - name: GRPC_PORT
              value: "9115"
          resources:
            requests:
              cpu: 125m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 9115
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 9115
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: commission-service
  namespace: game_engine
  labels:
    app: commission-service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 9015
      protocol: TCP
    - name: grpc
      port: 9115
      targetPort: 9115
      protocol: TCP
  selector:
    app: commission-service
