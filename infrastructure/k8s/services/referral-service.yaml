apiVersion: apps/v1
kind: Deployment
metadata:
  name: referral-service
  namespace: game-engine
  labels:
    app: referral-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: referral-service
  template:
    metadata:
      labels:
        app: referral-service
        tier: backend
    spec:
      containers:
        - name: referral-service
          image: game-engine/referral-service:latest
          ports:
            - containerPort: 9098
              name: grpc
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: game-engine-config
                  key: postgres-host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: game-engine-secrets
                  key: postgres-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: game-engine-config
                  key: redis-host
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:9098"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:9098"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: referral-service
  namespace: game-engine
spec:
  selector:
    app: referral-service
  ports:
    - port: 9098
      targetPort: 9098
      name: grpc
  type: ClusterIP
