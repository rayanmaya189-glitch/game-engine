apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-merchant
  namespace: game-engine
  labels:
    app: gateway-merchant
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-merchant
  template:
    metadata:
      labels:
        app: gateway-merchant
        tier: backend
    spec:
      containers:
        - name: gateway-merchant
          image: game-engine/gateway-merchant:latest
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: game-engine-config
                  key: redis-host
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-merchant
  namespace: game-engine
spec:
  selector:
    app: gateway-merchant
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  type: ClusterIP
