# =============================================================================
# MetalLB Configuration
# =============================================================================
# Load balancer for on-premises Kubernetes

---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    app: metallb

---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: metallb-system
  name: config
data:
  config: |
    # Address pool for services
    address-pools:
      - name: default
        protocol: layer2
        addresses:
          # MetalLB will assign IPs from this range
          # Use your internal network range
          - 10.0.100.100-10.0.100.200
        
      - name: game-services
        protocol: layer2
        auto-assign: false
        addresses:
          - 10.0.100.201-10.0.100.250
        
      - name: api-gateways
        protocol: layer2
        auto-assign: false
        addresses:
          - 10.0.100.251-10.0.100.30

    # L2 Advertisement
    l2-advertisement:
      - name: default
        address-pool: default
        
    # BGP Configuration (if using BGP)
    # peers:
    #   - peer-address: 10.0.0.1
    #     peer-asn: 65000
    #     my-asn: 65001

---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: metallb-system
  name: controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: metallb-system
  name: speaker

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: metallb-system
  name: config-watcher
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metallb-system:controller
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["services/status"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metallb-system:speaker
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: metallb-system
  name: config-watcher
subjects:
  - kind: ServiceAccount
    name: controller
    namespace: metallb-system
roleRef:
  kind: Role
  name: config-watcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metallb-system:controller
subjects:
  - kind: ServiceAccount
    name: controller
    namespace: metallb-system
roleRef:
  kind: ClusterRole
  name: metallb-system:controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metallb-system:speaker
subjects:
  - kind: ServiceAccount
    name: speaker
    namespace: metallb-system
roleRef:
  kind: ClusterRole
  name: metallb-system:speaker
  apiGroup: rbac.authorization.k8s.io

---
# MetalLB Controller Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: metallb-system
  name: controller
  labels:
    app: metallb
    component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metallb
      component: controller
  template:
    metadata:
      labels:
        app: metallb
        component: controller
    spec:
      serviceAccountName: controller
      securityContext:
        runAsNonRoot: false
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: controller
          image: metallb/controller:v0.13.12
          args:
            - --controller-name=crd-controller
            - --log-level=info
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: monitoring
              containerPort: 7472
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 100Mi

---
# MetalLB Speaker DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: metallb-system
  name: speaker
  labels:
    app: metallb
    component: speaker
spec:
  selector:
    matchLabels:
      app: metallb
      component: speaker
  template:
    metadata:
      labels:
        app: metallb
        component: speaker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7472"
    spec:
      serviceAccountName: speaker
      terminationGracePeriodSeconds: 0
      hostNetwork: true
      securityContext:
        runAsNonRoot: false
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: speaker
          image: metallb/speaker:v0.13.12
          args:
            - --port=7472
            - --config-map=metallb-system/config
            - --log-level=info
          env:
            - name: METALLB_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: METALLB_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
                - NET_RAW
            readOnlyRootFilesystem: true
          ports:
            - name: monitoring
              containerPort: 7472
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 100Mi
