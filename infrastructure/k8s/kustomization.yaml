# =============================================================================
# Kustomization for Casino Game Engine
# =============================================================================
# Main orchestration file for Kubernetes manifests

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace for all resources
namespace: game_engine

# Common labels for all resources
commonLabels:
  app.kubernetes.io/name: game_engine
  app.kubernetes.io/part-of: casino-gaming-platform
  app.kubernetes.io/managed-by: kustomize

# Resources to apply
resources:
  # Base configurations
  - base/00-namespaces.yaml
  - base/01-service-accounts.yaml
  - base/02-network-policies.yaml

  # Database services
  - services/database/postgresql.yaml
  - services/database/redis.yaml

  # Addons
  - addons/metallb.yaml
  - addons/ingress-nginx.yaml
  - addons/storage.yaml

  # Core Services
  - services/auth/deployment.yaml
  - services/user/deployment.yaml
  - services/wallet/deployment.yaml
  - services/game-registry/deployment.yaml
  - services/game-engine/deployment.yaml

  # API Gateways
  - services/gateway-player/deployment.yaml
  - services/gateway-admin/deployment.yaml
  - services/gateway-merchant/deployment.yaml
  - services/gateway-agent/deployment.yaml

  # WebSocket Gateway
  - services/websocket-gateway/deployment.yaml

  # Game Services
  - services/card-games/deployment.yaml
  - services/dice-games/deployment.yaml
  - services/slot-games/deployment.yaml
  - services/rng-service/deployment.yaml
  - services/live-dealer-service/deployment.yaml
  - services/sports-betting-service/deployment.yaml

  # Betting & Wagering
  - services/betting/deployment.yaml
  - services/tournament/deployment.yaml
  - services/jackpot-service/deployment.yaml

  # Business Services
  - services/merchant-service/deployment.yaml
  - services/agent-service/deployment.yaml
  - services/loyalty-service/deployment.yaml

  # Financial Services
  - services/payment-service/deployment.yaml
  - services/bonus-service/deployment.yaml
  - services/commission-service/deployment.yaml
  - services/affiliate-service/deployment.yaml

  # Compliance Services
  - services/kyc-service/deployment.yaml
  - services/aml-service/deployment.yaml
  - services/fraud-service/deployment.yaml
  - services/risk-service/deployment.yaml

  # Social & Engagement
  - services/leaderboard-service/deployment.yaml
  - services/winners-showcase-service/deployment.yaml
  - services/multiplayer/deployment.yaml
  - services/chat/deployment.yaml
  - services/notification/deployment.yaml
  - services/banner-service/banner-deployment.yaml
  - services/referral-service/referral-deployment.yaml

  # Ingress
  - ingress/public-ingress.yaml

# ConfigMap generation
configMapGenerator:
  - name: game-engine-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - REGISTRY=registry.game-engine.local:5000
      - DB_HOST=postgresql.databases.svc.cluster.local
      - DB_PORT=5432
      - DB_USER=app_user
      - REDIS_HOST=redis.databases.svc.cluster.local
      - REDIS_PORT=6379
      - NATS_HOST=nats.databases.svc.cluster.local
      - NATS_PORT=4222

# Secret generation
secretGenerator:
  - name: database-credentials
    literals:
      - username=app_user
      - password=ChangeMeAppPass123!
  - name: jwt-secret
    literals:
      - secret=ChangeMeJWTSecretKey12345678901234567890!
  - name: redis-credentials
    literals:
      - password=ChangeMeRedis123!

# Patches for resource limits
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            containers:
              - name: placeholder
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
    target:
      kind: Deployment

# Replicas for critical services
replicas:
  - name: auth-service
    count: 3
  - name: user-service
    count: 3
  - name: wallet-service
    count: 3
  - name: gateway-player
    count: 3
  - name: gateway-admin
    count: 2
  - name: websocket-gateway
    count: 3
  - name: game-registry
    count: 2
  - name: betting
    count: 2
  - name: tournament
    count: 2
  - name: payment-service
    count: 2
  - name: bonus-service
    count: 2
