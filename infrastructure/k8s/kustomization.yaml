# =============================================================================
# Kustomization for Casino Game Engine
# =============================================================================
# Main orchestration file for Kubernetes manifests

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace for all resources
namespace: game-engine

# Common labels for all resources
commonLabels:
  app.kubernetes.io/name: game-engine
  app.kubernetes.io/part-of: casino-gaming-platform
  app.kubernetes.io/managed-by: kustomize

# Resources to apply
resources:
  # Base configurations
  - base/00-namespaces.yaml
  - base/01-service-accounts.yaml
  - base/02-network-policies.yaml
  
  # Database services (external)
  - services/database/postgresql.yaml
  - services/database/redis.yaml
  
  # Addons (uncomment after cluster setup)
  # - addons/metallb.yaml
  # - addons/ingress-nginx.yaml
  # - addons/storage.yaml
  
  # Services
  - services/auth/deployment.yaml
  - services/user/deployment.yaml
  - services/wallet/deployment.yaml
  - services/gateway-player/deployment.yaml
  
  # Ingress
  - ingress/public-ingress.yaml

# ConfigMap generation
configMapGenerator:
  - name: game-engine-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - REGISTRY=registry.game-engine.local:5000

# Secret generation
secretGenerator:
  - name: database-credentials
    literals:
      - username=app_user
      - password=ChangeMeAppPass123!
  - name: jwt-secret
    literals:
      - secret=ChangeMeJWTSecretKey12345678901234567890!
  - name: redis-credentials
    literals:
      - password=ChangeMeRedis123!

# Patches
patches:
  # Add resources limits to all deployments
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            containers:
              - name: placeholder
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
    target:
      kind: Deployment

# Replicas for each service
replicas:
  - name: auth-service
    count: 3
  - name: user-service
    count: 3
  - name: wallet-service
    count: 3
  - name: gateway-player
    count: 5
