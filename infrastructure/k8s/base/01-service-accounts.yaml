# =============================================================================
# Kubernetes Service Accounts
# =============================================================================
# Service accounts for each microservice with appropriate RBAC

---
# Service Account for Player API Gateway
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-player
  namespace: game_engine
  labels:
    app: gateway-player
    component: api-gateway
---
# Service Account for Admin API Gateway
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-admin
  namespace: game_engine
  labels:
    app: gateway-admin
    component: api-gateway
---
# Service Account for Merchant API Gateway
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-merchant
  namespace: game_engine
  labels:
    app: gateway-merchant
    component: api-gateway
---
# Service Account for Agent API Gateway
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-agent
  namespace: game_engine
  labels:
    app: gateway-agent
    component: api-gateway
---
# Service Account for Auth Service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  namespace: game_engine
  labels:
    app: auth-service
    component: service
---
# Service Account for User Service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: game_engine
  labels:
    app: user-service
    component: service
---
# Service Account for Wallet Service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wallet-service
  namespace: game_engine
  labels:
    app: wallet-service
    component: service
---
# Service Account for Game Registry Service
apiVersion: v1
kind: ServiceAccount
metadata:
  name: game-registry-service
  namespace: game-services
  labels:
    app: game-registry-service
    component: service
---
# Service Account for Monitoring (Prometheus)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    component: monitoring
---
# Service Account for Ingress Controller
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-ingress
  namespace: ingress-nginx
  labels:
    app: nginx-ingress
    component: ingress-controller
