# =============================================================================
# Kubernetes Namespaces
# =============================================================================
# Casino Game Engine uses multiple namespaces for isolation

---
apiVersion: v1
kind: Namespace
metadata:
  name: game-engine
  labels:
    name: game-engine
    purpose: casino-gaming-platform
    # Enable pod security standards
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: game-services
  labels:
    name: game-services
    purpose: game-services-and-providers
    # Enable pod security standards
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    name: platform
    purpose: platform-services
    # Enable pod security standards
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring
    purpose: monitoring-and-observability
---
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    name: ingress-nginx
    purpose: ingress-controller
---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  labels:
    name: kube-system
    kubernetes.io/metadata.name: kube-system
