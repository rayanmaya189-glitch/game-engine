# =============================================================================
# Ansible Playbook: Database & Cache Installation
# =============================================================================
# This playbook installs PostgreSQL, TimescaleDB, Redis, and Memcached
# Run: ansible-playbook -i inventory.ini 03-databases.yml

- name: Install Databases and Cache
  hosts: database, cache, messaging
  become: yes
  gather_facts: yes
  vars:
    postgres_version: "16"
    postgres_data_dir: "/var/lib/postgresql/{{ postgres_version }}/main"
    postgres_conf_dir: "/etc/postgresql/{{ postgres_version }}/main"
    redis_version: "7.2"
    redis_port: 6379
    memcached_version: "1.6"
    nats_version: "2.10"
    # Database passwords (use vault in production)
    postgres_password: "ChangeMe123!"
    postgres_replication_password: "ChangeMeReplication123!"
    redis_password: "ChangeMeRedis123!"

  tasks:
    # =========================================================================
    # POSTGRESQL PRIMARY
    # =========================================================================
    - name: Install PostgreSQL Primary
      block:
        - name: Add PostgreSQL APT repository
          apt_repository:
            repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
            state: present
          ignore_errors: yes

        - name: Add PostgreSQL GPG key
          apt_key:
            url: "https://www.postgresql.org/media/keys/ACCC4CF8.asc"
            state: present
          ignore_errors: yes

        - name: Update apt cache
          apt:
            update_cache: yes
          ignore_errors: yes

        - name: Install PostgreSQL
          apt:
            name:
              - postgresql-{{ postgres_version }}
              - postgresql-contrib-{{ postgres_version }}
              - postgresql-{{ postgres_version }}-pgtap
              - libpq-dev
              - python3-psycopg2
            state: present
          ignore_errors: yes

        - name: Create PostgreSQL data directory
          file:
            path: "{{ postgres_data_dir }}"
            state: directory
            owner: postgres
            group: postgres
            mode: '0700'
          ignore_errors: yes

        - name: Configure PostgreSQL
          copy:
            dest: "{{ postgres_conf_dir }}/postgresql.conf"
            content: |
              # PostgreSQL Configuration for Casino Game Engine
              # Connection Settings
              listen_addresses = '*'
              port = 5432
              max_connections = 500
              superuser_reserved_connections = 10

              # Memory Settings
              shared_buffers = 4GB
              effective_cache_size = 12GB
              maintenance_work_mem = 1GB
              work_mem = 64MB
              huge_pages = try

              # Query Tuning
              random_page_cost = 1.1
              effective_io_concurrency = 200
              default_statistics_target = 100

              # Write Ahead Log (WAL)
              wal_level = replica
              max_wal_senders = 10
              max_replication_slots = 10
              wal_keep_size = 1GB
              hot_standby = on

              # Logging
              logging_collector = on
              log_directory = 'log'
              log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
              log_rotation_age = 1d
              log_rotation_size = 100MB
              log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
              log_timezone = 'UTC'
              log_connections = on
              log_disconnections = on
              log_lock_waits = on
              log_statement = 'ddl'
              log_min_duration_statement = 1000

              # Autovacuum
              autovacuum = on
              autovacuum_max_workers = 4
              autovacuum_naptime = 1min

              # Replication
              synchronous_commit = on
              synchronous_standby_names = ''

              # Connection Pooling
              max_prepared_transactions = 0

              # Custom Settings
              shared_preload_libraries = 'pg_stat_statements'
              track_activities = on
              track_counts = on
              track_io_timing = on
              track_functions = pl

              # Resource Usage
              shared_memory_type = mmap
              dynamic_shared_memory_type = posix
          ignore_errors: yes

        - name: Configure PostgreSQL access
          copy:
            dest: "{{ postgres_conf_dir }}/pg_hba.conf"
            content: |
              # TYPE  DATABASE        USER            ADDRESS                 METHOD
              # Local connections
              local   all             postgres                                peer
              local   all             all                                     peer
              # IPv4 local connections for k8s pods
              host    all             all             10.42.0.0/16            scram-sha-256
              host    all             all             10.43.0.0/16            scram-sha-256
              # IPv4 local connections for app servers
              host    all             all             10.0.0.0/8              scram-sha-256
              # Replication
              host    replication     all             10.0.0.0/8              scram-sha-256
          ignore_errors: yes

        - name: Set PostgreSQL password
          postgresql_user:
            name: postgres
            password: "{{ postgres_password }}"
            role_attr_flags: SUPERUSER
          ignore_errors: yes

        - name: Enable and start PostgreSQL
          service:
            name: postgresql
            state: started
            enabled: yes
          ignore_errors: yes

      when: 
        - ansible_host == '10.0.1.10'  # db-primary

    # =========================================================================
    # POSTGRESQL REPLICA
    # =========================================================================
    - name: Install PostgreSQL Replica
      block:
        - name: Add PostgreSQL APT repository
          apt_repository:
            repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
            state: present
          ignore_errors: yes

        - name: Add PostgreSQL GPG key
          apt_key:
            url: "https://www.postgresql.org/media/keys/ACCC4CF8.asc"
            state: present
          ignore_errors: yes

        - name: Update apt cache
          apt:
            update_cache: yes
          ignore_errors: yes

        - name: Install PostgreSQL
          apt:
            name:
              - postgresql-{{ postgres_version }}
              - postgresql-contrib-{{ postgres_version }}
            state: present
          ignore_errors: yes

        - name: Stop PostgreSQL
          service:
            name: postgresql
            state: stopped
          ignore_errors: yes

        - name: Configure PostgreSQL as replica
          copy:
            dest: "{{ postgres_conf_dir }}/postgresql.conf"
            content: |
              # PostgreSQL Configuration for Replica
              listen_addresses = '*'
              port = 5432
              max_connections = 500

              # Memory Settings
              shared_buffers = 4GB
              effective_cache_size = 12GB
              maintenance_work_mem = 1GB

              # Hot Standby
              hot_standby = on
              hot_standby_feedback = on
              max_standby_streaming_delay = 30s

              # WAL
              wal_level = replica
              primary_conninfo = 'host=db-primary port=5432 user=replication password={{ postgres_replication_password }}'
              restore_command = 'cp /var/lib/postgresql/wal/%f %p'

              # Logging
              logging_collector = on
              log_directory = 'log'
              log_filename = 'postgresql-replica.log'

        - name: Configure PostgreSQL access
          copy:
            dest: "{{ postgres_conf_dir }}/pg_hba.conf"
            content: |
              local   all             all                                     peer
              host    all             all             10.0.0.0/8              scram-sha-256
          ignore_errors: yes

        - name: Enable and start PostgreSQL
          service:
            name: postgresql
            state: started
            enabled: yes
          ignore_errors: yes

      when: "'db-replica' in inventory_hostname"

    # =========================================================================
    # TIMESCALEDB
    # =========================================================================
    - name: Install TimescaleDB
      block:
        - name: Add TimescaleDB APT repository
          apt_repository:
            repo: "deb https://package.timescale.com/apt {{ ansible_distribution_release }} timescaledb-2.13 main"
            state: present
          ignore_errors: yes

        - name: Add TimescaleDB GPG key
          apt_key:
            url: "https://package.timescale.com/assets/TimescaleDB-.key"
            state: present
          ignore_errors: yes

        - name: Update apt cache
          apt:
            update_cache: yes
          ignore_errors: yes

        - name: Install TimescaleDB
          apt:
            name:
              - timescaledb-2-postgresql-{{ postgres_version }}
            state: present
          ignore_errors: yes

        - name: Configure TimescaleDB
          copy:
            dest: "{{ postgres_conf_dir }}/conf.d/timescaledb.conf"
            content: |
              # TimescaleDB Configuration
              shared_preload_libraries = 'timescaledb, pg_stat_statements'
              timescaledb.max_background_workers = 8
              timescaledb.telemetry_level = 'off'

        - name: Restart PostgreSQL
          service:
            name: postgresql
            state: restarted
          ignore_errors: yes

      when: "'timescale' in inventory_hostname"

    # =========================================================================
    # REDIS
    # =========================================================================
    - name: Install Redis
      block:
        - name: Add Redis PPA
          apt_repository:
            ppa: chris-lea/redis-server
          ignore_errors: yes

        - name: Update apt cache
          apt:
            update_cache: yes
          ignore_errors: yes

        - name: Install Redis
          apt:
            name:
              - redis-server
            state: present
          ignore_errors: yes

        - name: Configure Redis
          copy:
            dest: /etc/redis/redis.conf
            content: |
              # Redis Configuration for Casino Game Engine
              bind 0.0.0.0
              port {{ redis_port no

              # }}
              protected-mode General
              daemonize no
              supervised systemd
              pidfile /var/run/redis/redis-server.pid
              loglevel notice
              logfile /var/log/redis/redis-server.log

              # Persistence
              save 900 1
              save 300 10
              save 60 10000
              stop-writes-on-bgsave-error yes
              rdbcompression yes
              rdbchecksum yes
              dbfilename dump.rdb
              dir /var/lib/redis

              # Replication
              replica-serve-stale-data yes
              replica-read-only yes
              repl-diskless-sync yes
              repl-diskless-sync-delay 5
              repl-disable-tcp-nodelay no

              # Security
              requirepass {{ redis_password }}
              rename-command FLUSHDB ""
              rename-command FLUSHALL ""
              rename-command CONFIG ""

              # Memory Management
              maxmemory 8gb
              maxmemory-policy allkeys-lru
              maxmemory-samples 5

              # Lazy Freeing
              lazyfree-lazy-eviction no
              lazyfree-lazy-expire no
              lazyfree-lazy-server-del no
              replica-lazy-flush no

              # Append Only File
              appendonly yes
              appendfilename "appendonly.aof"
              appendfsync everysec
              no-appendfsync-on-rewrite no
              auto-aof-rewrite-percentage 100
              auto-aof-rewrite-min-size 64mb

              # Slow Log
              slowlog-log-slower-than 10000
              slowlog-max-len 128

              # Advanced
              hash-max-ziplist-entries 512
              hash-max-ziplist-value 64
              list-max-ziplist-size -2
              set-max-intset-entries 512
              zset-max-ziplist-entries 128
              zset-max-ziplist-value 64
              activerehashing yes
              client-output-buffer-limit normal 0 0 0
              client-output-buffer-limit replica 256mb 64mb 60
              client-output-buffer-limit pubsub 32mb 8mb 60

        - name: Create Redis user
          user:
            name: redis
            system: yes
            shell: /bin/false
            home: /var/lib/redis
          ignore_errors: yes

        - name: Ensure Redis directories exist
          file:
            path: "{{ item }}"
            state: directory
            owner: redis
            group: redis
            mode: '0755'
          loop:
            - /var/lib/redis
            - /var/log/redis

        - name: Enable and start Redis
          service:
            name: redis-server
            state: started
            enabled: yes
          ignore_errors: yes

      when: "'redis' in inventory_hostname"

    # =========================================================================
    # MEMCACHED
    # =========================================================================
    - name: Install Memcached
      block:
        - name: Update apt cache
          apt:
            update_cache: yes
          ignore_errors: yes

        - name: Install Memcached
          apt:
            name:
              - memcached
              - libmemcached-tools
            state: present
          ignore_errors: yes

        - name: Configure Memcached
          copy:
            dest: /etc/memcached.conf
            content: |
              # Memcached Configuration for Casino Game Engine
              -m 4096
              -p 11211
              -u memcached
              -l 0.0.0.0
              -c 10240
              -vv
              -I 10m

        - name: Enable and start Memcached
          service:
            name: memcached
            state: started
            enabled: yes
          ignore_errors: yes

      when: "'memcached' in inventory_hostname"

    # =========================================================================
    # NATS MESSAGING
    # =========================================================================
    - name: Install NATS
      block:
        - name: Download NATS server
          get_url:
            url: "https://github.com/nats-io/nats-server/releases/download/v{{ nats_version }}/nats-server-v{{ nats_version }}-linux-amd64.tar.gz"
            dest: /tmp/nats-server.tar.gz
          ignore_errors: yes

        - name: Extract NATS
          unarchive:
            src: /tmp/nats-server.tar.gz
            dest: /usr/local/bin/
            remote_src: yes
            creates: /usr/local/bin/nats-server
          ignore_errors: yes

        - name: Create NATS user
          user:
            name: nats
            system: yes
            shell: /bin/false
            home: /var/lib/nats
          ignore_errors: yes

        - name: Create NATS directories
          file:
            path: "{{ item }}"
            state: directory
            owner: nats
            group: nats
            mode: '0755'
          loop:
            - /var/lib/nats
            - /var/log/nats
            - /etc/nats

        - name: Configure NATS
          copy:
            dest: /etc/nats/nats.conf
            content: |
              # NATS Configuration for Casino Game Engine
              listen: 0.0.0.0:4222
              http: 8222

              # Clustering
              cluster {
                name: main
                listen: 0.0.0.0:6222

                routes = [
                  nats-01:6222
                  nats-02:6222
                  nats-03:6222
                ]
              }

              # JetStream (for persistence)
              jetstream {
                store_dir: /var/lib/nats/jetstream
                max_memory_store: 1GB
                max_file_store: 10GB
              }

              # Logging
              logfile: /var/log/nats/nats.log
              log_time: true

              # Limits
              max_connections: 10000
              max_payload: 8MB
              max_pending: 64MB

              # Authorization
              # authorization {
              #   user: nats
              #   password: ChangeMeNATS123!
              #   timeout: 10
              # }

        - name: Create NATS service
          copy:
            dest: /etc/systemd/system/nats.service
            content: |
              [Unit]
              Description=NATS Messaging Server
              After=network.target

              [Service]
              ExecStart=/usr/local/bin/nats-server -c /etc/nats/nats.conf
              Restart=always
              RestartSec=10s
              User=nats
              Group=nats

              [Install]
              WantedBy=multi-user.target
          ignore_errors: yes

        - name: Enable and start NATS
          systemd:
            name: nats
            state: started
            enabled: yes
            daemon_reload: yes
          ignore_errors: yes

      when: "'nats' in inventory_hostname"

    # =========================================================================
    # CONTAINER REGISTRY
    # =========================================================================
    - name: Install Docker Registry
      block:
        - name: Create registry directories
          file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - /opt/registry
            - /opt/registry/data
            - /opt/registry/certs

        - name: Create registry config
          copy:
            dest: /opt/registry/config.yml
            content: |
              version: 0.1
              log:
                level: info
                fields:
                  service: registry
              storage:
                filesystem:
                  rootdirectory: /opt/registry/data
                delete:
                  enabled: true
                maintenance:
                  uploadpurging:
                    enabled: false
              http:
                addr: :5000
                headers:
                  X-Content-Type-Options: [nosniff]
              health:
                storagedriver:
                  enabled: true
                  interval: 10s
                  threshold: 3

        - name: Run registry container
          docker_container:
            name: registry
            image: registry:2
            state: started
            restart_policy: always
            ports:
              - "5000:5000"
            volumes:
              - /opt/registry/data:/var/lib/registry
              - /opt/registry/config.yml:/etc/docker/registry/config.yml
            memory_limit: 1g

      when: "'registry' in inventory_hostname"
