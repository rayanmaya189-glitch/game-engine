# =============================================================================
# Casino Game Engine - Ansible Inventory
# =============================================================================
# This inventory file defines all VM hosts for the on-premises deployment
# Supports 100K+ concurrent users with auto-scaling

[all:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3
ansible_connection=ssh
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# -----------------------------------------------------------------------------
# Kubernetes Control Plane (3 nodes for HA)
# -----------------------------------------------------------------------------
[kube_control_plane]
k8s-master-01 ansible_host=10.0.1.10 etcd_member_name=etcd1
k8s-master-02 ansible_host=10.0.1.11 etcd_member_name=etcd2
k8s-master-03 ansible_host=10.0.1.12 etcd_member_name=etcd3

[kube_control_plane:vars]
kube_role=control-plane
node_label="node-role.kubernetes.io/control-plane=true"

# -----------------------------------------------------------------------------
# Kubernetes Worker Nodes - Game Services
# -----------------------------------------------------------------------------
[kube_worker_game]
k8s-game-01 ansible_host=10.0.2.10 node_group=game-services
k8s-game-02 ansible_host=10.0.2.11 node_group=game-services
k8s-game-03 ansible_host=10.0.2.12 node_group=game-services
k8s-game-04 ansible_host=10.0.2.13 node_group=game-services
k8s-game-05 ansible_host=10.0.2.14 node_group=game-services
k8s-game-06 ansible_host=10.0.2.15 node_group=game-services

# Additional game nodes for scaling (can be added dynamically)
# k8s-game-07 ansible_host=10.0.2.16 node_group=game-services
# k8s-game-08 ansible_host=10.0.2.17 node_group=game-services

[kube_worker_game:vars]
node_label="node-group=game-services"

# -----------------------------------------------------------------------------
# Kubernetes Worker Nodes - API Gateways
# -----------------------------------------------------------------------------
[kube_worker_api]
k8s-api-01 ansible_host=10.0.3.10 node_group=api-gateways
k8s-api-02 ansible_host=10.0.3.11 node_group=api-gateways
k8s-api-03 ansible_host=10.0.3.12 node_group=api-gateways
k8s-api-04 ansible_host=10.0.3.13 node_group=api-gateways

[kube_worker_api:vars]
node_label="node-group=api-gateways"

# -----------------------------------------------------------------------------
# Kubernetes Worker Nodes - Internal Services
# -----------------------------------------------------------------------------
[kube_worker_internal]
k8s-internal-01 ansible_host=10.0.4.10 node_group=internal-services
k8s-internal-02 ansible_host=10.0.4.11 node_group=internal-services
k8s-internal-03 ansible_host=10.0.4.12 node_group=internal-services

[kube_worker_internal:vars]
node_label="node-group=internal-services"

# -----------------------------------------------------------------------------
# Database Nodes (Bare Metal)
# -----------------------------------------------------------------------------
[database]
db-primary ansible_host=10.0.10.10 db_type=postgres db_role=primary
db-replica-01 ansible_host=10.0.10.11 db_type=postgres db_role=replica
db-replica-02 ansible_host=10.0.10.12 db_type=postgres db_role=replica
db-timescale ansible_host=10.0.10.20 db_type=timescaledb

[database:vars]
ansible_user=postgres

# -----------------------------------------------------------------------------
# Cache Nodes
# -----------------------------------------------------------------------------
[cache]
redis-01 ansible_host=10.0.11.10 cache_type=redis role=master
redis-02 ansible_host=10.0.11.11 cache_type=redis role=replica
redis-03 ansible_host=10.0.11.12 cache_type=redis role=replica
memcached-01 ansible_host=10.0.12.10 cache_type=memcached
memcached-02 ansible_host=10.0.12.11 cache_type=memcached
memcached-03 ansible_host=10.0.12.12 cache_type=memcached

# -----------------------------------------------------------------------------
# Message Queue Nodes
# -----------------------------------------------------------------------------
[messaging]
nats-01 ansible_host=10.0.13.10 nats_cluster=main
nats-02 ansible_host=10.0.13.11 nats_cluster=main
nats-03 ansible_host=10.0.13.12 nats_cluster=main

# -----------------------------------------------------------------------------
# Monitoring Nodes
# -----------------------------------------------------------------------------
[monitoring]
monitoring-01 ansible_host=10.0.20.10

# -----------------------------------------------------------------------------
# Registry Node
# -----------------------------------------------------------------------------
[registry]
registry-01 ansible_host=10.0.21.10

# -----------------------------------------------------------------------------
# Build Nodes
# -----------------------------------------------------------------------------
[build]
build-01 ansible_host=10.0.22.10

# -----------------------------------------------------------------------------
# Aggregated Groups
# -----------------------------------------------------------------------------
[kube_nodes:children]
kube_worker_game
kube_worker_api
kube_worker_internal

[database:children]
db_primary
db_replica
db_timescale

[cache:children]
redis_cluster
memcached_cluster

[storage:children]
database
monitoring
registry

# Alias groups for easier targeting
[all_k8s:children]
kube_control_plane
kube_nodes

[all_servers:children]
kube_control_plane
kube_nodes
database
cache
messaging
monitoring
registry
build
