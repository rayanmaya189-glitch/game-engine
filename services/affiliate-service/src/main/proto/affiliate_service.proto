syntax = "proto3";

package game_engine.affiliate.v1;

option java_multiple_files = true;
option java_package = "com.game_engine.affiliate.v1";

service AffiliateService {
  rpc RegisterAffiliate(RegisterAffiliateRequest) returns (RegisterAffiliateResponse);
  rpc GetAffiliateByCode(GetAffiliateByCodeRequest) returns (GetAffiliateByCodeResponse);
  rpc GetAffiliatesByMerchant(GetAffiliatesByMerchantRequest) returns (GetAffiliatesByMerchantResponse);
  rpc GetActiveAffiliates(GetActiveAffiliatesRequest) returns (GetActiveAffiliatesResponse);
  rpc UpdateAffiliateTier(UpdateAffiliateTierRequest) returns (UpdateAffiliateTierResponse);
  rpc UpdateAffiliateStatus(UpdateAffiliateStatusRequest) returns (UpdateAffiliateStatusResponse);
  rpc TrackClick(TrackClickRequest) returns (TrackClickResponse);
  rpc TrackRegistration(TrackRegistrationRequest) returns (TrackRegistrationResponse);
  rpc TrackFirstDeposit(TrackFirstDepositRequest) returns (TrackFirstDepositResponse);
  rpc GetReferrals(GetReferralsRequest) returns (GetReferralsResponse);
  rpc GetCampaignReferrals(GetCampaignReferralsRequest) returns (GetCampaignReferralsResponse);
  rpc CalculateCommission(CalculateCommissionRequest) returns (CalculateCommissionResponse);
  rpc AddSubAffiliate(AddSubAffiliateRequest) returns (AddSubAffiliateResponse);
  rpc GetSubAffiliates(GetSubAffiliatesRequest) returns (GetSubAffiliatesResponse);
  rpc GetAffiliateStats(GetAffiliateStatsRequest) returns (GetAffiliateStatsResponse);
  rpc RedirectToRegistration(RedirectToRegistrationRequest) returns (RedirectToRegistrationResponse);
}

message Affiliate {
  int64 id = 1;
  string affiliate_code = 2;
  string name = 3;
  string email = 4;
  string phone = 5;
  string status = 6;
  string affiliate_tier = 7;
  double revenue_share_percentage = 8;
  int64 merchant_id = 9;
  int32 total_clicks = 10;
  int32 total_registrations = 11;
  int32 total_depositors = 12;
  double total_revenue = 13;
  double total_commission = 14;
  int64 created_at = 15;
  int64 updated_at = 16;
}

message Referral {
  int64 id = 1;
  int64 affiliate_id = 2;
  string referral_code = 3;
  string source = 4;
  string ip_address = 5;
  string user_agent = 6;
  string campaign_id = 7;
  string status = 8;
  int64 clicked_at = 9;
  int64 registered_at = 10;
  int64 first_deposit_at = 11;
  double first_deposit_amount = 12;
}

message RegisterAffiliateRequest {
  string name = 1;
  string email = 2;
  string phone = 3;
  int64 merchant_id = 4;
}

message RegisterAffiliateResponse {
  Affiliate affiliate = 1;
}

message GetAffiliateByCodeRequest {
  string affiliate_code = 1;
}

message GetAffiliateByCodeResponse {
  Affiliate affiliate = 1;
  bool found = 2;
}

message GetAffiliatesByMerchantRequest {
  int64 merchant_id = 1;
}

message GetAffiliatesByMerchantResponse {
  repeated Affiliate affiliates = 1;
}

message GetActiveAffiliatesRequest {
  int64 merchant_id = 1;
}

message GetActiveAffiliatesResponse {
  repeated Affiliate affiliates = 1;
}

message UpdateAffiliateTierRequest {
  int64 affiliate_id = 1;
  string tier = 2;
}

message UpdateAffiliateTierResponse {
  Affiliate affiliate = 1;
}

message UpdateAffiliateStatusRequest {
  int64 affiliate_id = 1;
  string status = 2;
}

message UpdateAffiliateStatusResponse {
  Affiliate affiliate = 1;
}

message TrackClickRequest {
  string affiliate_code = 1;
  string ip_address = 2;
  string user_agent = 3;
  string campaign_id = 4;
}

message TrackClickResponse {
  Referral referral = 1;
}

message TrackRegistrationRequest {
  string referral_code = 1;
  string ip_address = 2;
}

message TrackRegistrationResponse {
  Referral referral = 1;
}

message TrackFirstDepositRequest {
  string referral_code = 1;
  double deposit_amount = 2;
}

message TrackFirstDepositResponse {
  Referral referral = 1;
}

message GetReferralsRequest {
  int64 affiliate_id = 1;
}

message GetReferralsResponse {
  repeated Referral referrals = 1;
}

message GetCampaignReferralsRequest {
  string campaign_id = 1;
}

message GetCampaignReferralsResponse {
  repeated Referral referrals = 1;
}

message CalculateCommissionRequest {
  int64 affiliate_id = 1;
  double revenue = 2;
}

message CalculateCommissionResponse {
  double revenue = 1;
  double commission = 2;
}

message AddSubAffiliateRequest {
  int64 parent_affiliate_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
}

message AddSubAffiliateResponse {
  Affiliate sub_affiliate = 1;
}

message GetSubAffiliatesRequest {
  int64 parent_affiliate_id = 1;
}

message GetSubAffiliatesResponse {
  repeated Affiliate sub_affiliates = 1;
}

message GetAffiliateStatsRequest {
  int64 affiliate_id = 1;
}

message GetAffiliateStatsResponse {
  int64 total_clicks = 1;
  int64 total_registrations = 2;
  int64 total_depositors = 3;
  double total_revenue = 4;
  double total_commission = 5;
}

message RedirectToRegistrationRequest {
  string referral_code = 1;
}

message RedirectToRegistrationResponse {
  string redirect_url = 1;
}
