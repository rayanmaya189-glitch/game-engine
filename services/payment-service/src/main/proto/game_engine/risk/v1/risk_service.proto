syntax = "proto3";

package game_engine.risk.v1;

option go_package = "gen/go/risk/v1;riskv1";
option java_multiple_files = true;
option java_package = "com.game_engine.risk.v1";

service RiskService {
  rpc GetRiskScore(GetRiskScoreRequest) returns (GetRiskScoreResponse);
  rpc UpdateRiskScore(UpdateRiskScoreRequest) returns (UpdateRiskScoreResponse);
}

message GetRiskScoreRequest {
  string user_id = 1;
}

message GetRiskScoreResponse {
  string user_id = 1;
  int32 score = 2;
  string risk_level = 3;
}

message UpdateRiskScoreRequest {
  string user_id = 1;
  int32 score = 2;
  string reason = 3;
}

message UpdateRiskScoreResponse {
  bool success = 1;
}
