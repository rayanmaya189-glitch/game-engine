server:
  port: 8081

spring:
  application:
    name: payment-service
  
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:casino_payments}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

grpc:
  server:
    port: 9012
  client:
    wallet-service:
      address: ${WALLET_SERVICE_HOST:localhost}:${WALLET_SERVICE_PORT:9011}
    risk-service:
      address: ${RISK_SERVICE_HOST:localhost}:${RISK_SERVICE_PORT:9016}

wallet:
  service:
    host: ${WALLET_SERVICE_HOST:localhost}
    grpc:
      port: ${WALLET_SERVICE_PORT:9011}
    timeout-seconds: 10

payment:
  limits:
    deposit:
      min: 10
      max: 10000
    withdrawal:
      min: 20
      max: 50000
      auto-approve-threshold: 1000
  risk:
    threshold:
      low: 25
      medium: 50
      high: 75
    default-score: 0
    service:
      url: ${RISK_SERVICE_URL:}
  wagering:
    default-met: true
  bonus:
    service:
      url: ${BONUS_SERVICE_URL:}
  exchange:
    api-url: ${EXCHANGE_API_URL:}
    api-key: ${EXCHANGE_API_KEY:}
    base-currency: USD
    cache-ttl-ms: 60000
  gateway:
    stripe:
      api-key: ${STRIPE_API_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      auto-payout: false
    adyen:
      api-key: ${ADYEN_API_KEY:}
      merchant-account: ${ADYEN_MERCHANT_ACCOUNT:}
      environment: ${ADYEN_ENVIRONMENT:test}
    skrill:
      email: ${SKRILL_EMAIL:}
      password: ${SKRILL_PASSWORD:}
      merchant-id: ${SKRILL_MERCHANT_ID:}

logging:
  level:
    root: INFO
    com.game_engine.payment: DEBUG
    org.springframework.web: INFO
