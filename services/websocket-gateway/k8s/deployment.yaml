apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: websocket-gateway
  namespace: game-engine
  labels:
    app: websocket-gateway
    tier: gateway
spec:
  serviceName: websocket-gateway
  replicas: 3
  selector:
    matchLabels:
      app: websocket-gateway
  template:
    metadata:
      labels:
        app: websocket-gateway
        tier: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
    spec:
      serviceAccountName: websocket-gateway
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - websocket-gateway
              topologyKey: kubernetes.io/hostname
      containers:
      - name: websocket-gateway
        image: game-engine/websocket-gateway:latest
        imagePullPolicy: Always
        ports:
        - name: ws
          containerPort: 8084
          protocol: TCP
        - name: wss
          containerPort: 8085
          protocol: TCP
        - name: http
          containerPort: 4000
          protocol: TCP
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MIX_ENV
          value: "prod"
        - name: PORT
          value: "8084"
        - name: WSS_PORT
          value: "8085"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: game-engine-secrets
              key: jwt-secret-key
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: game-engine-secrets
              key: secret-key-base
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: game-engine-config
              key: database-host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: game-engine-secrets
              key: database-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: game-engine-secrets
              key: database-password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: game-engine-config
              key: redis-host
        - name: NATS_HOST
          valueFrom:
            configMapKeyRef:
              name: game-engine-config
              key: nats-host
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8084
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /app/etc
      volumes:
      - name: config
        configMap:
          name: websocket-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-gateway
  namespace: game-engine
  labels:
    app: websocket-gateway
spec:
  type: LoadBalancer
  selector:
    app: websocket-gateway
  ports:
  - name: ws
    port: 8084
    targetPort: 8084
    protocol: TCP
  - name: wss
    port: 8085
    targetPort: 8085
    protocol: TCP
  - name: http
    port: 4000
    targetPort: 4000
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-gateway-headless
  namespace: game-engine
  labels:
    app: websocket-gateway
spec:
  clusterIP: None
  selector:
    app: websocket-gateway
  ports:
  - name: ws
    port: 8084
    targetPort: 8084
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: websocket-gateway
  namespace: game-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: websocket-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: websocket-gateway-config
  namespace: game-engine
data:
  app.env: |
    MIX_ENV=prod
    PORT=8084
    WSS_PORT=8085
    REDIS_HOST=redis-master
    REDIS_PORT=6379
    NATS_HOST=nats
    NATS_PORT=4222
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: websocket-gateway
  namespace: game-engine
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: websocket-gateway
  namespace: game-engine
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: websocket-gateway
  namespace: game-engine
subjects:
- kind: ServiceAccount
  name: websocket-gateway
  namespace: game-engine
roleRef:
  kind: Role
  name: websocket-gateway
  apiGroup: rbac.authorization.k8s.io
