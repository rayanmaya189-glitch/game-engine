server:
  host: "0.0.0.0"
  grpc_port: 9096
database:
  host: "${DB_HOST:-localhost}"
  port: "${DB_PORT:-5432}"
  user: "${DB_USER:-postgres}"
  password: "${DB_PASSWORD:-postgres}"
  name: "${DB_NAME:-loyalty_service}"
  max_connections: 20
redis:
  host: "${REDIS_HOST:-localhost}"
  port: "${REDIS_PORT:-6379}"
loyalty:
  points_per_dollar: 10
  tier_thresholds:
    bronze: 0
    silver: 1000
    gold: 5000
    platinum: 25000
    diamond: 100000
  tier_multipliers:
    bronze: 1.0
    silver: 1.25
    gold: 1.5
    platinum: 2.0
    diamond: 3.0
  points_expiry_days: 365
