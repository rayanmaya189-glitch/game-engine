syntax = "proto3";

package game_engine.winners.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/game_engine/common-service/proto/gen/go/winners/v1;winnersv1";
option java_multiple_files = true;
option java_package = "com.game_engine.winners.v1";

// WinnersService manages winner showcases and privacy settings
service WinnersService {
  rpc GetRecentWinners(GetRecentWinnersRequest) returns (GetRecentWinnersResponse);
  rpc GetBigWins(GetBigWinsRequest) returns (GetBigWinsResponse);
  rpc GetJackpotWinners(GetJackpotWinnersRequest) returns (GetJackpotWinnersResponse);
  rpc RecordWin(RecordWinRequest) returns (RecordWinResponse);
  rpc GetPrivacySettings(GetPrivacySettingsRequest) returns (GetPrivacySettingsResponse);
  rpc UpdatePrivacySettings(UpdatePrivacySettingsRequest) returns (UpdatePrivacySettingsResponse);
}

message GetRecentWinnersRequest {
  int32 limit = 1;
}

message GetRecentWinnersResponse {
  repeated Winner winners = 1;
  int32 total = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message GetBigWinsRequest {
  double threshold = 1;
  int32 limit = 2;
}

message GetBigWinsResponse {
  repeated Winner wins = 1;
  double threshold = 2;
  int32 total = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message GetJackpotWinnersRequest {
  double threshold = 1;
  int32 limit = 2;
}

message GetJackpotWinnersResponse {
  repeated Winner winners = 1;
  double threshold = 2;
  int32 total = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message Winner {
  int64 id = 1;
  string user_id = 2;
  string username = 3;
  string display_name = 4;
  double win_amount = 5;
  string currency = 6;
  string game_type = 7;
  string game_name = 8;
  string win_type = 9;
  double multiplier = 10;
  google.protobuf.Timestamp timestamp = 11;
}

message RecordWinRequest {
  string user_id = 1;
  string username = 2;
  double win_amount = 3;
  string currency = 4;
  string game_type = 5;
  string game_name = 6;
  double multiplier = 7;
}

message RecordWinResponse {
  bool success = 1;
  string message = 2;
}

message GetPrivacySettingsRequest {
  string user_id = 1;
}

message GetPrivacySettingsResponse {
  string user_id = 1;
  bool anonymize_name = 2;
  bool show_on_leaderboard = 3;
  bool show_on_jackpot_list = 4;
  bool opt_out_of_showcase = 5;
}

message UpdatePrivacySettingsRequest {
  string user_id = 1;
  bool anonymize_name = 2;
  bool show_on_leaderboard = 3;
  bool show_on_jackpot_list = 4;
  bool opt_out_of_showcase = 5;
}

message UpdatePrivacySettingsResponse {
  bool success = 1;
  string message = 2;
}
