syntax = "proto3";

package game_engine.bonus.v1;

import "google/protobuf/timestamp.proto";
import "common/v1/pagination.proto";

option go_package = "gen/go/bonus/v1;bonusv1";
option java_multiple_files = true;
option java_package = "com.game_engine.bonus.v1";

// Bonus Service - manages bonuses, claims, wagering requirements
service BonusService {
  // Bonus management
  rpc GetActiveBonuses(GetActiveBonusesRequest) returns (GetActiveBonusesResponse);
  rpc GetBonus(GetBonusRequest) returns (GetBonusResponse);
  rpc CreateBonus(CreateBonusRequest) returns (CreateBonusResponse);
  rpc ClaimBonus(ClaimBonusRequest) returns (ClaimBonusResponse);
  rpc CheckEligibility(CheckEligibilityRequest) returns (CheckEligibilityResponse);
  rpc GetBonusHistory(GetBonusHistoryRequest) returns (GetBonusHistoryResponse);
  rpc GetActiveBonusClaims(GetActiveBonusClaimsRequest) returns (GetActiveBonusClaimsResponse);
  
  // Wagering
  rpc ProcessWageringContribution(ProcessWageringContributionRequest) returns (ProcessWageringContributionResponse);
  rpc CompleteBonus(CompleteBonusRequest) returns (CompleteBonusResponse);
  rpc CancelBonus(CancelBonusRequest) returns (CancelBonusResponse);
  
  // Stats
  rpc GetBonusStats(GetBonusStatsRequest) returns (GetBonusStatsResponse);
}

// Bonus message
message Bonus {
  string id = 1;
  string name = 2;
  string description = 3;
  string type = 4;              // WELCOME, DEPOSIT, NO_DEPOSIT, FREE_SPINS, CASHBACK, LOYALTY
  string status = 5;            // ACTIVE, INACTIVE, EXPIRED, EXHAUSTED
  double amount = 6;
  double percentage = 7;         // For percentage-based bonuses
  double max_amount = 8;
  double min_deposit = 9;
  int32 wagering_requirement = 10;
  double max_bet = 11;
  string allowed_games = 12;      // Comma-separated game IDs or "ALL"
  google.protobuf.Timestamp start_date = 13;
  google.protobuf.Timestamp end_date = 14;
  int32 max_uses = 15;
  int32 current_uses = 16;
  string vip_level = 17;          // ALL, BRONZE, SILVER, GOLD, PLATINUM
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
}

// GetActiveBonuses
message GetActiveBonusesRequest {}

message GetActiveBonusesResponse {
  repeated Bonus bonuses = 1;
}

// GetBonus
message GetBonusRequest {
  string id = 1;
}

message GetBonusResponse {
  Bonus bonus = 1;
}

// CreateBonus (admin)
message CreateBonusRequest {
  Bonus bonus = 1;
}

message CreateBonusResponse {
  Bonus bonus = 1;
}

// ClaimBonus
message ClaimBonusRequest {
  string bonus_id = 1;
  string user_id = 2;
}

message ClaimBonusResponse {
  bool success = 1;
  string message = 2;
  double bonus_amount = 3;
  map<string, string> details = 4;
}

// CheckEligibility
message CheckEligibilityRequest {
  string user_id = 1;
  string bonus_id = 2;
}

message CheckEligibilityResponse {
  bool eligible = 1;
  map<string, string> details = 2;
}

// GetBonusHistory
message GetBonusHistoryRequest {
  string user_id = 1;
}

message GetBonusHistoryResponse {
  repeated BonusHistoryEntry entries = 1;
}

message BonusHistoryEntry {
  string bonus_id = 1;
  string bonus_name = 2;
  double amount = 3;
  string status = 4;           // CLAIMED, IN_PROGRESS, COMPLETED, CANCELLED
  google.protobuf.Timestamp claimed_at = 5;
  google.protobuf.Timestamp completed_at = 6;
}

// GetActiveBonusClaims
message GetActiveBonusClaimsRequest {
  string user_id = 1;
}

message GetActiveBonusClaimsResponse {
  repeated ActiveBonusClaim claims = 1;
}

message ActiveBonusClaim {
  string bonus_id = 1;
  string bonus_name = 2;
  double amount = 3;
  double wagering_progress = 4;
  double wagering_required = 5;
  string status = 6;
  google.protobuf.Timestamp expires_at = 7;
}

// ProcessWageringContribution
message ProcessWageringContributionRequest {
  string user_id = 1;
  string bonus_id = 2;
  double bet_amount = 3;
  string game_type = 4;
}

message ProcessWageringContributionResponse {
  bool success = 1;
  double wagering_progress = 2;
  double wagering_required = 3;
  bool completed = 4;
}

// CompleteBonus
message CompleteBonusRequest {
  string user_id = 1;
  string bonus_id = 2;
  double winnings = 3;
}

message CompleteBonusResponse {
  bool success = 1;
  double payout_amount = 2;
  string message = 3;
}

// CancelBonus
message CancelBonusRequest {
  string user_id = 1;
  string bonus_id = 2;
  string reason = 3;
}

message CancelBonusResponse {
  bool success = 1;
  string message = 2;
}

// GetBonusStats
message GetBonusStatsRequest {
  string user_id = 1;
}

message GetBonusStatsResponse {
  int32 total_bonuses_claimed = 1;
  double total_bonus_amount = 2;
  double total_wagered = 3;
  double total_winnings = 4;
  map<string, string> stats = 5;
}
