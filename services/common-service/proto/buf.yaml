# Buf configuration for proto linting and breaking change detection
# https://buf.build/docs/configuration/v1/buf-yaml

version: v1
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    - PACKAGE_NO_IMPORT_CYCLE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - ENUM_VALUE_PREFIX
  allow_comment_ignores: true
breaking:
  use:
    - FILE
  except:
    - EXTENSION_VALUE_SENTINEL_VALUE
    - EXTENSION_NUMBER
    - FIELD_DEFAULT
  ignore:
    - google/type/
    - google/protobuf/
    - grpc/reflection/v1alpha/
