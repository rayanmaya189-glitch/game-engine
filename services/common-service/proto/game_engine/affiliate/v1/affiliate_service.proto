syntax = "proto3";

package game_engine.affiliate.v1;

import "google/protobuf/timestamp.proto";
import "game_engine/common/v1/pagination.proto";

option go_package = "gen/go/affiliate/v1;affiliatev1";
option java_multiple_files = true;
option java_package = "com.game_engine.affiliate.v1";

service AffiliateService {
  // Track affiliate click
  rpc TrackClick(TrackClickRequest) returns (TrackClickResponse);
  
  // Get performance report
  rpc GetPerformanceReport(GetPerformanceReportRequest) returns (GetPerformanceReportResponse);
  
  // Get click reports
  rpc GetClickReports(GetClickReportsRequest) returns (GetClickReportsResponse);
  
  // Get conversion reports
  rpc GetConversionReports(GetConversionReportsRequest) returns (GetConversionReportsResponse);
  
  // Get affiliate links
  rpc GetAffiliateLinks(GetAffiliateLinksRequest) returns (GetAffiliateLinksResponse);
  
  // Create affiliate link
  rpc CreateAffiliateLink(CreateAffiliateLinkRequest) returns (CreateAffiliateLinkResponse);
}

message TrackClickRequest {
  string affiliate_code = 1;
  string ip_address = 2;
  string user_agent = 3;
  string referrer = 4;
}

message TrackClickResponse {
  string click_id = 1;
  int64 timestamp = 2;
  bool is_new_visitor = 3;
}

message GetPerformanceReportRequest {
  string affiliate_id = 1;
  string start_date = 2;
  string end_date = 3;
}

message GetPerformanceReportResponse {
  int64 total_clicks = 1;
  int64 total_conversions = 2;
  double conversion_rate = 3;
  double total_revenue = 4;
  double commission = 5;
}

message GetClickReportsRequest {
  string affiliate_id = 1;
  string start_date = 2;
  string end_date = 3;
  int32 page = 4;
  int32 limit = 5;
}

message GetClickReportsResponse {
  repeated ClickReport clicks = 1;
  int32 total = 2;
}

message ClickReport {
  string click_id = 1;
  string ip_address = 2;
  string user_agent = 3;
  int64 timestamp = 4;
  bool converted = 5;
}

message GetConversionReportsRequest {
  string affiliate_id = 1;
  string start_date = 2;
  string end_date = 3;
  int32 page = 4;
  int32 limit = 5;
}

message GetConversionReportsResponse {
  repeated ConversionReport conversions = 1;
  int32 total = 2;
}

message ConversionReport {
  string conversion_id = 1;
  string click_id = 2;
  string player_id = 3;
  double revenue = 4;
  double commission = 5;
  int64 timestamp = 6;
}

message GetAffiliateLinksRequest {
  string affiliate_id = 1;
}

message GetAffiliateLinksResponse {
  repeated AffiliateLink links = 1;
}

message AffiliateLink {
  string link_id = 1;
  string code = 2;
  string url = 3;
  string campaign = 4;
}

message CreateAffiliateLinkRequest {
  string affiliate_id = 1;
  string campaign = 2;
  string url_template = 3;
}

message CreateAffiliateLinkResponse {
  string link_id = 1;
  string code = 2;
  string url = 3;
}
