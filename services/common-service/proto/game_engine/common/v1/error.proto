syntax = "proto3";

package game_engine.common.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

option go_package = "gen/go/common/v1;commonv1";
option java_multiple_files = true;
option java_package = "com.game_engine.common.v1";

// Standard error response format
message Error {
  // Error code (e.g., "INVALID_REQUEST", "NOT_FOUND")
  string code = 1;
  
  // Human-readable error message
  string message = 2;
  
  // Detailed error description
  string details = 3;
  
  // Error category for client-side handling
  ErrorCategory category = 4;
  
  // HTTP status code
  int32 http_status = 5;
  
  // Additional metadata
  map<string, string> metadata = 6;
  
  // Stack trace (only in development)
  string stack_trace = 7;
  
  // Timestamp when error occurred
  google.protobuf.Timestamp timestamp = 8;
  
  // Request ID for tracing
  string request_id = 9;
  
  // Additional error details
  repeated google.protobuf.Any details_list = 10;
}

// Error category for client-side handling
enum ErrorCategory {
  // Unknown error category
  ERROR_CATEGORY_UNSPECIFIED = 0;
  
  // Client error (4xx)
  ERROR_CATEGORY_CLIENT = 1;
  
  // Server error (5xx)
  ERROR_CATEGORY_SERVER = 2;
  
  // Network error
  ERROR_CATEGORY_NETWORK = 3;
  
  // Authentication/Authorization error
  ERROR_CATEGORY_AUTH = 4;
  
  // Validation error
  ERROR_CATEGORY_VALIDATION = 5;
  
  // Rate limit error
  ERROR_CATEGORY_RATE_LIMIT = 6;
  
  // Not found error
  ERROR_CATEGORY_NOT_FOUND = 7;
  
  // Conflict error
  ERROR_CATEGORY_CONFLICT = 8;
  
  // Timeout error
  ERROR_CATEGORY_TIMEOUT = 9;
}

// Common error codes
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_REQUEST = 1;
  ERROR_CODE_UNAUTHORIZED = 2;
  ERROR_CODE_FORBIDDEN = 3;
  ERROR_CODE_NOT_FOUND = 4;
  ERROR_CODE_CONFLICT = 5;
  ERROR_CODE_VALIDATION_FAILED = 6;
  ERROR_CODE_RATE_LIMIT_EXCEEDED = 7;
  ERROR_CODE_INTERNAL_ERROR = 8;
  ERROR_CODE_SERVICE_UNAVAILABLE = 9;
  ERROR_CODE_TIMEOUT = 10;
  ERROR_CODE_INVALID_TOKEN = 11;
  ERROR_CODE_TOKEN_EXPIRED = 12;
  ERROR_CODE_INSUFFICIENT_PERMISSIONS = 13;
  ERROR_CODE_INVALID_CREDENTIALS = 14;
  ERROR_CODE_ACCOUNT_LOCKED = 15;
  ERROR_CODE_ACCOUNT_DISABLED = 16;
  ERROR_CODE_EMAIL_NOT_VERIFIED = 17;
  ERROR_CODE_PHONE_NOT_VERIFIED = 18;
  ERROR_CODE_2FA_REQUIRED = 19;
  ERROR_CODE_2FA_INVALID = 20;
  ERROR_CODE_DEPOSIT_FAILED = 21;
  ERROR_CODE_WITHDRAWAL_FAILED = 22;
  ERROR_CODE_INSUFFICIENT_BALANCE = 23;
  ERROR_CODE_BET_FAILED = 24;
  ERROR_CODE_GAME_NOT_FOUND = 25;
  ERROR_CODE_GAME_UNAVAILABLE = 26;
}

// Error details for validation errors
message ValidationError {
  // Field that failed validation
  string field = 1;
  
  // Error message
  string message = 2;
  
  // Invalid value (as string for safety)
  string invalid_value = 3;
  
  // Error code
  string code = 4;
}

// Error response wrapper
message ErrorResponse {
  Error error = 1;
  google.protobuf.Timestamp timestamp = 2;
  string request_id = 3;
}
