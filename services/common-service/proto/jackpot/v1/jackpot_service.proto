syntax = "proto3";

package game_engine.jackpot.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/game_engine/common-service/proto/gen/go/jackpot/v1;jackpotv1";
option java_multiple_files = true;
option java_package = "com.game_engine.jackpot.v1";

service JackpotService {
  // List jackpots
  rpc ListJackpots(ListJackpotsRequest) returns (ListJackpotsResponse);
   
  // Get jackpot details
  rpc GetJackpot(GetJackpotRequest) returns (GetJackpotResponse);
   
  // Get jackpot winners
  rpc GetWinners(GetWinnersRequest) returns (GetWinnersResponse);
   
  // Join jackpot
  rpc JoinJackpot(JoinJackpotRequest) returns (JoinJackpotResponse);
   
  // Get jackpot history
  rpc GetJackpotHistory(GetJackpotHistoryRequest) returns (GetJackpotHistoryResponse);
}

message ListJackpotsRequest {
  string status = 1;
}

message ListJackpotsResponse {
  repeated Jackpot jackpots = 1;
}

message Jackpot {
  string jackpot_id = 1;
  string name = 2;
  string description = 3;
  double current_amount = 4;
  double min_bet = 5;
  double max_bet = 6;
  string status = 7;
  google.protobuf.Timestamp starts_at = 8;
  google.protobuf.Timestamp ends_at = 9;
}

message GetJackpotRequest {
  string jackpot_id = 1;
}

message GetJackpotResponse {
  Jackpot jackpot = 1;
}

message GetWinnersRequest {
  string jackpot_id = 1;
  int32 limit = 2;
}

message GetWinnersResponse {
  repeated Winner winners = 1;
}

message Winner {
  string winner_id = 1;
  string username = 2;
  double amount = 3;
  google.protobuf.Timestamp won_at = 4;
}

message JoinJackpotRequest {
  string jackpot_id = 1;
  string user_id = 2;
  double bet_amount = 3;
}

message JoinJackpotResponse {
  bool success = 1;
  string message = 2;
}

message GetJackpotHistoryRequest {
  string user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message GetJackpotHistoryResponse {
  repeated JackpotHistoryEntry entries = 1;
  int32 total = 2;
}

message JackpotHistoryEntry {
  string jackpot_id = 1;
  string jackpot_name = 2;
  double amount = 3;
  string result = 4;
  google.protobuf.Timestamp played_at = 5;
}
