syntax = "proto3";

package game_engine.wallet.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "common/v1/enums.proto";
import "common/v1/pagination.proto";
import "common/v1/money.proto";

option go_package = "gen/go/wallet/v1;walletsv1";
option java_multiple_files = true;
option java_package = "com.game_engine.wallet.v1";

// Wallet Service - handles player balances, deposits, withdrawals, and betting
service WalletService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc GetAllBalances(GetAllBalancesRequest) returns (GetAllBalancesResponse);
  rpc GetTransactionHistory(GetTransactionHistoryRequest) returns (GetTransactionHistoryResponse);
  rpc CreateDeposit(CreateDepositRequest) returns (CreateDepositResponse);
  rpc ConfirmDeposit(ConfirmDepositRequest) returns (ConfirmDepositResponse);
  rpc CreateWithdrawal(CreateWithdrawalRequest) returns (CreateWithdrawalResponse);
  rpc ConfirmWithdrawal(ConfirmWithdrawalRequest) returns (ConfirmWithdrawalResponse);
  rpc PlaceBet(PlaceBetRequest) returns (PlaceBetResponse);
  rpc SettleBet(SettleBetRequest) returns (SettleBetResponse);
  rpc CancelBet(CancelBetRequest) returns (CancelBetResponse);
  rpc CreateBonusCredit(CreateBonusCreditRequest) returns (CreateBonusCreditResponse);
  rpc ReverseTransaction(ReverseTransactionRequest) returns (ReverseTransactionResponse);
  rpc GetPendingBets(GetPendingBetsRequest) returns (GetPendingBetsResponse);
}

// Requests/Responses
message GetBalanceRequest {
  string user_id = 1;
  common.v1.BalanceType balance_type = 2;
}

message GetBalanceResponse {
  game_engine.common.v1.Money balance = 1;
  game_engine.common.v1.Money locked_amount = 2;
  game_engine.common.v1.Money available_amount = 3;
  game_engine.common.v1.Money bonus_amount = 4;
}

message GetAllBalancesRequest {
  string user_id = 1;
}

message GetAllBalancesResponse {
  repeated game_engine.common.v1.BalanceEntry balances = 1;
}

message GetTransactionHistoryRequest {
  string user_id = 1;
  repeated common.v1.TransactionType types = 2;
  repeated common.v1.TransactionStatus statuses = 3;
  google.protobuf.Timestamp start_date = 4;
  google.protobuf.Timestamp end_date = 5;
  common.v1.PaginationRequest pagination = 6;
}

message GetTransactionHistoryResponse {
  repeated Transaction transactions = 1;
  common.v1.PaginationResponse pagination = 2;
}

message CreateDepositRequest {
  string user_id = 1;
  game_engine.common.v1.Money amount = 2;
  common.v1.PaymentMethod payment_method = 3;
  string payment_provider = 4;
  string bonus_code = 5;
}

message CreateDepositResponse {
  Transaction deposit = 1;
  string payment_url = 2;
  string payment_reference = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message ConfirmDepositRequest {
  string transaction_id = 1;
  string payment_reference = 2;
  string provider_status = 3;
}

message ConfirmDepositResponse {
  bool success = 1;
  Transaction transaction = 2;
  string message = 3;
}

message CreateWithdrawalRequest {
  string user_id = 1;
  game_engine.common.v1.Money amount = 2;
  string withdrawal_method_id = 3;
}

message CreateWithdrawalResponse {
  Transaction withdrawal = 1;
  bool approval_required = 2;
  string message = 3;
}

message ConfirmWithdrawalRequest {
  string transaction_id = 1;
  string provider_reference = 2;
  common.v1.TransactionStatus status = 3;
}

message ConfirmWithdrawalResponse {
  bool success = 1;
  Transaction transaction = 2;
  string message = 3;
}

message PlaceBetRequest {
  string user_id = 1;
  string game_id = 2;
  game_engine.common.v1.Money amount = 3;
  string bet_type = 4;
  string selection = 5;
  string odds = 6;
}

message PlaceBetResponse {
  Transaction bet = 1;
  game_engine.common.v1.Money new_balance = 2;
  game_engine.common.v1.Money locked_amount = 3;
  string bet_id = 4;
  string message = 5;
}

message SettleBetRequest {
  string bet_id = 1;
  BetSettlementType settlement_type = 2;
  game_engine.common.v1.Money win_amount = 3;
  string result = 4;
}

message SettleBetResponse {
  bool success = 1;
  Transaction bet = 2;
  Transaction win = 3;
  game_engine.common.v1.Money new_balance = 4;
  string message = 5;
}

message CancelBetRequest {
  string bet_id = 1;
  string reason = 2;
}

message CancelBetResponse {
  bool success = 1;
  Transaction refund = 2;
  game_engine.common.v1.Money new_balance = 3;
  string message = 4;
}

message CreateBonusCreditRequest {
  string user_id = 1;
  game_engine.common.v1.Money amount = 2;
  BonusType bonus_type = 3;
  string bonus_code = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message CreateBonusCreditResponse {
  bool success = 1;
  Transaction bonus = 2;
  string message = 3;
}

message ReverseTransactionRequest {
  string transaction_id = 1;
  string reason = 2;
}

message ReverseTransactionResponse {
  bool success = 1;
  Transaction reversal = 2;
  string message = 3;
}

message GetPendingBetsRequest {
  string user_id = 1;
  string game_id = 2;
  common.v1.PaginationRequest pagination = 3;
}

message GetPendingBetsResponse {
  repeated Bet bets = 1;
  common.v1.PaginationResponse pagination = 2;
}

// Data models
message Transaction {
  string transaction_id = 1;
  string user_id = 2;
  common.v1.TransactionType type = 3;
  common.v1.TransactionStatus status = 4;
  common.v1.TransactionAmount amount = 5;
  common.v1.PaymentMethod payment_method = 6;
  string payment_provider = 7;
  string payment_reference = 8;
  string game_id = 9;
  string bet_id = 10;
  string description = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp processed_at = 13;
}

message Bet {
  string bet_id = 1;
  string user_id = 2;
  string game_id = 3;
  string bet_type = 4;
  string selection = 5;
  string odds = 6;
  game_engine.common.v1.Money stake = 7;
  game_engine.common.v1.Money potential_win = 8;
  game_engine.common.v1.Money actual_win = 9;
  BetSettlementType settlement_type = 10;
  common.v1.TransactionStatus status = 11;
  google.protobuf.Timestamp placed_at = 12;
}

enum BetSettlementType {
  BET_SETTLEMENT_TYPE_UNSPECIFIED = 0;
  BET_SETTLEMENT_TYPE_PENDING = 1;
  BET_SETTLEMENT_TYPE_WON = 2;
  BET_SETTLEMENT_TYPE_LOST = 3;
  BET_SETTLEMENT_TYPE_CANCELLED = 4;
}

enum BonusType {
  BONUS_TYPE_UNSPECIFIED = 0;
  BONUS_TYPE_WELCOME = 1;
  BONUS_TYPE_DEPOSIT = 2;
  BONUS_TYPE_NO_DEPOSIT = 3;
  BONUS_TYPE_FREE_SPINS = 4;
  BONUS_TYPE_CASHBACK = 5;
  BONUS_TYPE_LOYALTY = 6;
}
