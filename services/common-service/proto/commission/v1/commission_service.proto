}

message ApproveInsuranceClaimRequest {
  int64 id = 1;
  int64 reviewed_by = 2;
  string admin_note = 3;
}

message ApproveInsuranceClaimResponse {
  InsuranceClaimMsg claim = 1;
}

message RejectInsuranceClaimRequest {
  int64 id = 1;
  int64 reviewed_by = 2;
  string admin_note = 3;
}

message RejectInsuranceClaimResponse {
  InsuranceClaimMsg claim = 1;
}

message PayInsuranceClaimRequest {
  int64 id = 1;
}

message PayInsuranceClaimResponse {
  InsuranceClaimMsg claim = 1;
}

message GetUserInsuranceClaimsRequest {
  int64 user_id = 1;
}

message GetUserInsuranceClaimsResponse {
  repeated InsuranceClaimMsg claims = 1;
}

message GetInsuranceClaimsByStatusRequest {
  string status = 1;
}

message GetInsuranceClaimsByStatusResponse {
  repeated InsuranceClaimMsg claims = 1;
}

// Settlement RPCs
message GetUserSettlementsRequest {
  int64 user_id = 1;
}

message GetUserSettlementsResponse {
  repeated SettlementMsg settlements = 1;
}

message GetSettlementsByStatusRequest {
  string status = 1;
}

message GetSettlementsByStatusResponse {
  repeated SettlementMsg settlements = 1;
}

message GetSettlementsByTypeRequest {
  string type = 1;
}

message GetSettlementsByTypeResponse {
  repeated SettlementMsg settlements = 1;
}

message GetSettlementByIdRequest {
  int64 id = 1;
}

message GetSettlementByIdResponse {
  SettlementMsg settlement = 1;
  bool found = 2;
}

message GetUserTotalPendingRequest {
  int64 user_id = 1;
}

message GetUserTotalPendingResponse {
  double total_pending = 1;
}

message GetUserTotalSettledRequest {
  int64 user_id = 1;
}

message GetUserTotalSettledResponse {
  double total_settled = 1;
}

message SubmitClaimRequest {
  string user_id = 1;
  string affiliate_id = 2;
  string commission_id = 3;
  double amount = 4;
  string claim_reason = 5;
}

message SubmitClaimResponse {
  string claim_id = 1;
  string status = 2;
}

message GetUserClaimsRequest {
  string user_id = 1;
  string claim_id = 2;
}

message GetUserClaimsResponse {
  repeated CommissionClaimMsg claims = 1;
}

message GetClaimsByStatusRequest {
  string user_id = 1;
  string status = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetClaimsByStatusResponse {
  repeated CommissionClaimMsg claims = 1;
  int32 total = 2;
  int32 page = 3;
  int32 total_pages = 4;
}

message ClaimCommissionRequest {
  string claim_id = 1;
  string user_id = 2;
  string agent_id = 3;
  string commission_id = 4;
  double amount = 5;
}

message ClaimCommissionResponse {
  string transaction_id = 1;
  double amount = 2;
  string message = 3;
}



message GetAgentCommissionsRequest {
  string agent_id = 1;
  string start_date = 2;
  string end_date = 3;
}

message GetAgentCommissionsResponse {
  repeated Commission commissions = 1;
  int32 total = 2;
}

message GetCommissionHistoryRequest {
  string agent_id = 1;
  string page = 2;
  string limit = 3;
}

message GetCommissionHistoryResponse {
  repeated Commission history = 1;
  int32 total = 2;
}

