// Insurance Claim RPCs
message SubmitInsuranceClaimRequest {
  int64 user_id = 1;
  int64 game_id = 2;
  int64 bet_id = 3;
  string insurance_policy_id = 4;
  string claim_type = 5;
  double insured_amount = 6;
  double loss_amount = 7;
  string claim_reason = 8;
  string evidence_details = 9;
}

