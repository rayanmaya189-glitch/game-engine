server:
  host: "0.0.0.0"
  port: 9025
database:
  host: "${DB_HOST:-localhost}"
  port: "${DB_PORT:-5432}"
  user: "${DB_USER:-postgres}"
  password: "${DB_PASSWORD:-postgres}"
  name: "${DB_NAME:-winners_showcase_service}"
redis:
  host: "${REDIS_HOST:-localhost}"
  port: "${REDIS_PORT:-6379}"
showcase:
  max_recent_winners: 100
  min_win_amount: 100
  cache_ttl_seconds: 60
