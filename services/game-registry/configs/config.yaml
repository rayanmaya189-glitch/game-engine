app:
  name: game-registry
  env: development
  port: 8004
  grpc_port: 9004

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  name: game_registry
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 5

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 10

nats:
  url: nats://localhost:4222
  cluster_id: game_engine
  client_id: game-registry
  events:
    prefix: game.events

game:
  launch_url_template: "https://games.example.com/{game_id}?token={token}&session={session}"
  session_ttl: 3600
  cache_ttl: 600

logging:
  level: debug
  format: json
