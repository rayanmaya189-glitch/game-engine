server:
  host: "0.0.0.0"
  port: 9024
database:
  host: "${DB_HOST:-localhost}"
  port: "${DB_PORT:-5432}"
  user: "${DB_USER:-postgres}"
  password: "${DB_PASSWORD:-postgres}"
  name: "${DB_NAME:-leaderboard_service}"
redis:
  host: "${REDIS_HOST:-localhost}"
  port: "${REDIS_PORT:-6379}"
leaderboard:
  default_page_size: 50
  max_page_size: 200
  cache_ttl_seconds: 300
