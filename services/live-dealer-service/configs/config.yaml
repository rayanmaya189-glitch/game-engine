server:
  host: "0.0.0.0"
  grpc_port: 9092
database:
  host: "${DB_HOST:-localhost}"
  port: "${DB_PORT:-5432}"
  user: "${DB_USER:-postgres}"
  password: "${DB_PASSWORD:-postgres}"
  name: "${DB_NAME:-live_dealer_service}"
  max_connections: 20
redis:
  host: "${REDIS_HOST:-localhost}"
  port: "${REDIS_PORT:-6379}"
nats:
  host: "${NATS_HOST:-localhost}"
  port: "${NATS_PORT:-4222}"
dealer:
  max_tables_per_dealer: 3
  session_timeout_minutes: 60
  video_stream_bitrate: 2000
  max_players_per_table: 7
