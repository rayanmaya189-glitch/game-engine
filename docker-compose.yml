    container_name: game_engine-kyc-service
    ports:
      - "9031:9031"
      - "9131:9131"
    environment:
      - SERVICE_NAME=kyc-service
      - KYC_DATABASE_URL=postgresql+asyncpg://postgres:${DATABASE_PASSWORD:-postgres}@postgres:5432/kyc_service
      - KYC_REDIS_URL=redis://redis:6379/0
      - KYC_PORT=9031
      - GRPC_PORT=9131
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - game_engine-network
    restart: unless-stopped

  # ===========================================
  # AML Service (Python gRPC)
  # ===========================================
  aml-service:
    build:
      context: ./services/aml-service
