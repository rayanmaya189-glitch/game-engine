    ports:
      - "9015:9015"
      - "9035:9035"
    environment:
      - SERVICE_NAME=commission-service
      - SERVER_PORT=9035
      - GRPC_SERVER_PORT=9015
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/commission_service
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD:-postgres}
