      - AML_DATABASE_URL=postgresql+asyncpg://postgres:${DATABASE_PASSWORD:-postgres}@postgres:5432/aml_service
      - AML_PORT=9114
      - GRPC_PORT=9114
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - game_engine-network
