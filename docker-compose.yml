    environment:
      - SERVICE_NAME=wallet-service
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=wallet_service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_HOST=nats
      - NATS_PORT=4222
      - TIMESCALEDB_HOST=timescaledb
      - TIMESCALEDB_PORT=5433
    depends_on:
      - postgres
      - redis
      - nats
