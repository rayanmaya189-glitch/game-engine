    networks:
      - game_engine-network
    restart: unless-stopped

# ===========================================
# Networks
# ===========================================
networks:
  game_engine-network:
    driver: bridge
    name: game_engine-network

# ===========================================
# Volumes (shared with docker-compose.dev.yml)
# ===========================================
volumes:
  postgres-data:
    external: true
  redis-data:
    external: true
  timescaledb-data:
    external: true
  nats-data:
    external: true
