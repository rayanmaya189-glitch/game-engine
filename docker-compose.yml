# ===========================================
# Game Engine Casino - Complete Docker Compose
# All Microservices
# ===========================================

services:
  # ===========================================
  # Gateway Services (Hertz)
  # ===========================================
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: game-engine-gateway
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=gateway
    depends_on:
      - auth-service
      - user-service
      - wallet-service
      - game-registry
    networks:
      - game-engine-network
    restart: unless-stopped

  # ===========================================
  # WebSocket Gateway (Elixir Phoenix)
  # ===========================================
  websocket-gateway:
    build:
      context: ./services/websocket-gateway
      dockerfile: Dockerfile
    container_name: game-engine-websocket-gateway
    ports:
      - "8100:4000"
    environment:
      - MIX_ENV=prod
      - SERVICE_NAME=websocket-gateway
    depends_on:
      - redis
      - nats
    networks:
      - game-engine-network
    restart: unless-stopped

  # ===========================================
  # Auth Service (Go)
  # ===========================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: game-engine-auth-service
    ports:
      - "4433:4433"
      - "4434:4434"
    environment:
      - SERVICE_NAME=auth-service
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=auth_service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_HOST=nats
      - NATS_PORT=4222
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - game-engine-network
    restart: unless-stopped

  # ===========================================
  # User Service (Go)
