# ===========================================
# Game Engine Casino - Complete Docker Compose
# All Microservices with gRPC + NATS
# ===========================================

services:
  # ===========================================
  # API Gateway - Player (Hertz REST -> gRPC)
  # ===========================================
  gateway-player:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile.player
    container_name: game_engine-gateway-player
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=gateway-player
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - AUTH_SERVICE_GRPC=auth-service:4433
      - USER_SERVICE_GRPC=user-service:4435
      - WALLET_SERVICE_GRPC=wallet-service:4437
      - GAME_SERVICE_GRPC=game-registry:4439
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - auth-service
      - user-service
      - wallet-service
      - game-registry
    networks:
      - game_engine-network
    restart: unless-stopped

  # ===========================================
  # API Gateway - Admin (Hertz REST -> gRPC)
  # ===========================================
  gateway-admin:
    build:
      context: ./services/gateway/admin
      dockerfile: Dockerfile
    container_name: game_engine-gateway-admin
    ports:
      - "8081:8081"
    environment:
      - SERVICE_NAME=gateway-admin
      - SERVER_PORT=8081
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - AUTH_SERVICE_GRPC=auth-service:4433
      - USER_SERVICE_GRPC=user-service:4435
      - WALLET_SERVICE_GRPC=wallet-service:4437
      - GAME_SERVICE_GRPC=game-registry:4439
      - COMMISSION_SERVICE_GRPC=commission-service:9015
      - BONUS_SERVICE_GRPC=bonus-service:9013
      - TOURNAMENT_SERVICE_GRPC=tournament-service:9020
      - JACKPOT_SERVICE_GRPC=jackpot-service:9091
      - PAYMENT_SERVICE_GRPC=payment-service:9012
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - auth-service
      - wallet-service
    networks:
      - game_engine-network
    restart: unless-stopped

  # ===========================================
  # API Gateway - Merchant (Hertz REST -> gRPC)
  # ===========================================
  gateway-merchant:
    build:
      context: ./services/gateway/merchant
      dockerfile: Dockerfile
    container_name: game_engine-gateway-merchant
    ports:
      - "8082:8082"
    environment:
      - SERVICE_NAME=gateway-merchant
      - SERVER_PORT=8082
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - MERCHANT_SERVICE_GRPC=merchant-service:9095
      - WALLET_SERVICE_GRPC=wallet-service:4437
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - merchant-service
    networks:
      - game_engine-network
    restart: unless-stopped

  # ===========================================
  # API Gateway - Agent (Hertz REST -> gRPC)
  # ===========================================
  gateway-agent:
    build:
      context: ./services/gateway/agent
      dockerfile: Dockerfile
    container_name: game_engine-gateway-agent
    ports:
      - "8083:8083"
    environment:
      - SERVICE_NAME=gateway-agent
      - SERVER_PORT=8083
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - AGENT_SERVICE_GRPC=agent-service:9083
      - WALLET_SERVICE_GRPC=wallet-service:4437
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - agent-service
    networks:
      - game_engine-network
    restart: unless-stopped

  # ===========================================
  # WebSocket Gateway (Elixir Phoenix)
  # ===========================================
  websocket-gateway:
    build:
      context: ./services/websocket-gateway
      dockerfile: Dockerfile
    container_name: game_engine-websocket-gateway
    ports:
      - "4000:4000"
    environment:
      - MIX_ENV=prod
      - PHX_HOST=0.0.0.0
      - PORT=4000
      - SECRET_KEY_BASE=${WS_SECRET_KEY_BASE:-change-me-in-production}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WALLET_SERVICE_GRPC_HOST=wallet-service
      - WALLET_SERVICE_GRPC_PORT=4437
      - GAME_REGISTRY_GRPC_HOST=game-registry
      - GAME_REGISTRY_GRPC_PORT=4439
      - TOURNAMENT_SERVICE_GRPC_HOST=tournament-service
      - TOURNAMENT_SERVICE_GRPC_PORT=9020
      - JACKPOT_SERVICE_GRPC_HOST=jackpot-service
      - JACKPOT_SERVICE_GRPC_PORT=9091
      - AUTH_SERVICE_GRPC_HOST=auth-service
      - AUTH_SERVICE_GRPC_PORT=4433
    depends_on:
      - redis
      - wallet-service
      - game-registry
    networks:
      - game_engine-network
    restart: unless-stopped

  # ===========================================
  # Auth Service (Go gRPC)
  # ===========================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: game_engine-auth-service
    ports:
      - "4433:4433"
    environment:
      - SERVICE_NAME=auth-service
      - SERVER_GRPC_PORT=4433
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DB_NAME=auth_service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_HOST=nats
      - NATS_PORT=4222
      - JWT_PRIVATE_KEY_PATH=/certs/jwt-private.pem
      - JWT_PUBLIC_KEY_PATH=/certs/jwt-public.pem
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - game_engine-network
    restart: unless-stopped

  # ===========================================
