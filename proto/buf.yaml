version: "1.1"

deps:
  - buf.build/googleapis/googleapis
  - buf.build/grpc-ecosystem/grpc-gateway
  - buf.build/envoyproxy/protoc-gen-validate

lint:
  use:
    - DEFAULT
  except:
    - FIELD_NOT_REQUIRED
  ignore:
    - third_party

breaking:
  use:
    - FILE
  except:
    - EXTENSION_NO_DELETE
    - FIELD_SAME_DEFAULT
