syntax = "proto3";

package game_engine.v1;

option go_package = "github.com/game_engine/common-service/proto/gen/go/v1";

// Auth Service API
service AuthService {
  // Register a new user
  rpc Register(RegisterRequest) returns (RegisterResponse);
  
  // Login user
  rpc Login(LoginRequest) returns (LoginResponse);
  
  // Logout user
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  
  // Refresh access token
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  
  // Verify token
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
  
  // Request password reset
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  
  // Reset password
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  
  // Enable 2FA
  rpc Enable2FA(Enable2FARequest) returns (Enable2FAResponse);
  
  // Verify 2FA
  rpc Verify2FA(Verify2FARequest) returns (Verify2FAResponse);
  
  // Disable 2FA
  rpc Disable2FA(Disable2FARequest) returns (Disable2FAResponse);
  
  // Get user info
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  
  // Update user profile
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string referral_code = 4;
  string ip_address = 5;
  string device_id = 6;
}

message RegisterResponse {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_at = 4;
}

message LoginRequest {
  string username = 1;
  string password = 2;
  string ip_address = 3;
  string device_id = 4;
  string two_factor_code = 5;
}

message LoginResponse {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_at = 4;
  bool requires_2fa = 5;
}

message LogoutRequest {
  string user_id = 1;
  string token = 2;
}

message LogoutResponse {
  bool success = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string username = 3;
  repeated string roles = 4;
  int64 expires_at = 5;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {
  bool success = 1;
  string message = 2;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  bool success = 1;
  string message = 2;
}

message Enable2FARequest {
  string user_id = 1;
}

message Enable2FAResponse {
  bool success = 1;
  string secret = 2;
  string qr_code_url = 3;
}

message Verify2FARequest {
  string user_id = 1;
  string code = 2;
}

message Verify2FAResponse {
  bool success = 1;
  string backup_codes = 2;
}

message Disable2FARequest {
  string user_id = 1;
  string password = 2;
}

message Disable2FAResponse {
  bool success = 1;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message UpdateProfileRequest {
  string user_id = 1;
  string email = 2;
  string phone = 3;
  string first_name = 4;
  string last_name = 5;
  string date_of_birth = 6;
  string country = 7;
  string currency = 8;
}

message UpdateProfileResponse {
  bool success = 1;
  User user = 2;
}

// User model
message User {
  string user_id = 1;
  string username = 2;
  string email = 3;
  string phone = 4;
  string first_name = 5;
  string last_name = 6;
  string date_of_birth = 7;
  string country = 8;
  string currency = 9;
  string status = 10;
  string kyc_status = 11;
  int64 created_at = 12;
  int64 updated_at = 13;
}
