syntax = "proto3";

package game_engine.v1;

option go_package = "github.com/game_engine/gen/go/game_engine/v1";

// Game Engine Service API
service GameEngineService {
  // Start a new game session
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  
  // End a game session
  rpc EndSession(EndSessionRequest) returns (EndSessionResponse);
  
  // Get game state
  rpc GetGameState(GetGameStateRequest) returns (GetGameStateResponse);
  
  // Place bet
  rpc PlaceBet(PlaceBetRequest) returns (PlaceBetResponse);
  
  // Settle bet
  rpc SettleBet(SettleBetRequest) returns (SettleBetResponse);
  
  // Get game result
  rpc GetResult(GetResultRequest) returns (GetResultResponse);
  
  // Verify provably fair
  rpc VerifyProvablyFair(VerifyProvablyFairRequest) returns (VerifyProvablyFairResponse);
  
  // Get game history
  rpc GetGameHistory(GetGameHistoryRequest) returns (GetGameHistoryResponse);
}

message StartSessionRequest {
  string user_id = 1;
  string game_id = 2;
  string game_type = 3;
  string stake = 4;
  map<string, string> metadata = 5;
}

message StartSessionResponse {
  string session_id = 1;
  string game_id = 2;
  GameState state = 3;
  string server_seed = 4;
  string hashed_server_seed = 5;
}

message EndSessionRequest {
  string session_id = 1;
}

message EndSessionResponse {
  bool success = 1;
  GameResult result = 2;
}

message GetGameStateRequest {
  string session_id = 1;
}

message GetGameStateResponse {
  GameState state = 1;
}

message GameState {
  string session_id = 1;
  string game_id = 2;
  string status = 3;
  repeated string reels = 4;
  repeated Payline paylines = 5;
  string total_win = 6;
  map<string, string> additional_data = 7;
}

message Payline {
  int32 line_number = 1;
  repeated int32 positions = 2;
  string payout = 3;
}

message PlaceBetRequest {
  string session_id = 1;
  string bet_type = 2;
  string amount = 3;
  map<string, string> selections = 4;
}

message PlaceBetResponse {
  string bet_id = 1;
  string amount = 2;
  string odds = 3;
  string potential_win = 4;
}

message SettleBetRequest {
  string bet_id = 1;
  string result = 2;
  string win_amount = 3;
}

message SettleBetResponse {
  bool success = 1;
  string settled_amount = 2;
}

message GetResultRequest {
  string session_id = 1;
}

message GetResultResponse {
  GameResult result = 1;
}

message GameResult {
  string session_id = 1;
  string game_id = 2;
  string status = 3;
  string win_amount = 4;
  string profit = 5;
  bool is_win = 6;
  repeated string winning_symbols = 7;
  string server_seed = 8;
  string client_seed = 9;
  string nonce = 10;
}

message VerifyProvablyFairRequest {
  string session_id = 1;
  string server_seed = 2;
  string client_seed = 3;
  string nonce = 4;
  string result_hash = 5;
}

message VerifyProvablyFairResponse {
  bool valid = 1;
  string expected_result = 2;
  string actual_result = 3;
}

message GetGameHistoryRequest {
  string user_id = 1;
  int32 page = 2;
  int32 limit = 3;
  string game_type = 4;
}

message GetGameHistoryResponse {
  repeated GameHistoryEntry entries = 1;
  int32 total = 2;
}

message GameHistoryEntry {
  string session_id = 1;
  string user_id = 2;
  string game_id = 3;
  string game_type = 4;
  string stake = 5;
  string win = 6;
  string profit = 7;
  int64 played_at = 8;
}