# ===========================================
# Game Engine Casino - Development Docker Compose
# Local Development Infrastructure
# ===========================================

services:
  # ===========================================
  # PostgreSQL 16
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: game-engine-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game_engine
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 16MB
      POSTGRES_DEFAULT_STATISTICS_TARGET: 100
      POSTGRES_RANDOM_PAGE_COST: 1.1
      POSTGRES_EFFECTIVE_IO_CONCURRENCY: 200
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MIN_WAL_SIZE: 1GB
      POSTGRES_MAX_WAL_SIZE: 4GB
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - game-engine-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: >
      postgres
      -c log_destination=stderr
      -c log_connections=on
      -c log_disconnections=on
      -c log_duration=off
      -c log_line_prefix=%t:%r:%u@%d
      -c logging_collector=off

  # ===========================================
  # TimescaleDB
  # ===========================================
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: game-engine-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timeseries
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_SHARED_BUFFERS: 512MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 2GB
    ports:
      - "5433:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - game-engine-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: >
      postgres
      -c log_destination=stderr
      -c log_connections=on
      -c log_disconnections=on

  # ===========================================
  # Redis 7 Cluster
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: game-engine-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - game-engine-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # NATS with JetStream
  # ===========================================
  nats:
    image: nats:latest
    container_name: game-engine-nats
    command: >
      nats-server
      --js
      --cluster_name game-engine
      --max_memory_store 256MB
      --max_file_store 1GB
      --port 4222
      --http_port 8222
      --logtime
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
      - nats-data:/tmp
    networks:
      - game-engine-dev
    healthcheck:
      test: ["CMD", "nats", "-s", "localhost:4222", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # pgAdmin
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: game-engine-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@game-engine.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_ALLOW_save_password: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infrastructure/docker/pgadmin/sessions:/var/lib/pgadmin/sessions
    networks:
      - game-engine-dev
    depends_on:
      - postgres
      - timescaledb
    restart: unless-stopped

  # ===========================================
  # RedisInsight
  # ===========================================
  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: game-engine-redisinsight
    environment:
      RI_ENVIRONMENT: development
    ports:
      - "8001:8001"
    volumes:
      - redisinsight-data:/db
    networks:
      - game-engine-dev
    depends_on:
      - redis
    restart: unless-stopped

  # ===========================================
  # Prometheus (for metrics)
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: game-engine-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./infrastructure/docker/prometheus:/etc/prometheus
    networks:
      - game-engine-dev
    restart: unless-stopped

  # ===========================================
  # Grafana (for visualization)
  # ===========================================
  grafana:
    image: grafana/grafana:latest
    container_name: game-engine-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - game-engine-dev
    depends_on:
      - prometheus
    restart: unless-stopped

  # ===========================================
  # Jaeger (for distributed tracing)
  # ===========================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: game-engine-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_KEY_VALUE: /badger/data
      BADGER_DIRECTORY_VALUE_LOG: /badger/wal
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14268:14268"
    volumes:
      - jaeger-data:/badger
    networks:
      - game-engine-dev
    restart: unless-stopped

  # ===========================================
  # NATS JetStream Management UI
  # ===========================================
  natsbox:
    image: synadia/nats-box:latest
    container_name: game-engine-natsbox
    ports:
      - "8223:8223"
    networks:
      - game-engine-dev
    depends_on:
      - nats
    restart: unless-stopped

# ===========================================
# Networks
# ===========================================
networks:
  game-engine-dev:
    driver: bridge
    name: game-engine-dev

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres-data:
    driver: local
  timescaledb-data:
    driver: local
  redis-data:
    driver: local
  nats-data:
    driver: local
  pgadmin-data:
    driver: local
  redisinsight-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  jaeger-data:
    driver: local
