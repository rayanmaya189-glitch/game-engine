# =============================================================================
# GitHub Actions: Continuous Deployment
# =============================================================================
# Deploy to on-premises Kubernetes cluster

name: CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      rollback:
        description: 'Rollback to previous version'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      service:
        description: 'Service to rollback (leave empty for all)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: registry.game_engine.local:5000
  KUBECONFIG: ${{ secrets.KUBECONFIG }}

jobs:
  # ===========================================================================
  # Build and Scan Images
  # ===========================================================================
  build-and-scan:
    name: Build and Scan Images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${{ github.sha }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Go services
        run: |
          for service in auth-service user-service wallet-service game-registry gateway-player gateway-admin gateway-merchant gateway-agent; do
            docker build \
              -f infrastructure/docker/Dockerfile.$service \
              -t ${{ env.REGISTRY }}/$service:${{ steps.version.outputs.version }} \
              .
          done

      - name: Build Elixir services
        run: |
          docker build \
            -f services/websocket-gateway/Dockerfile \
            -t ${{ env.REGISTRY }}/websocket-gateway:${{ steps.version.outputs.version }} \
            services/websocket-gateway

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Push images to registry
        run: |
          for service in auth-service user-service wallet-service game-registry gateway-player gateway-admin gateway-merchant gateway-agent websocket-gateway; do
            docker push ${{ env.REGISTRY }}/$service:${{ steps.version.outputs.version }}
          done

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback != 'true' && (github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging')
    environment: 
      name: staging
      url: https://staging.game_engine.local
      deployment_history:
        - url: https://staging.game_engine.local
    needs: build-and-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Deploy base configurations
        run: |
          kubectl apply -f infrastructure/k8s/base/00-namespaces.yaml
          kubectl apply -f infrastructure/k8s/base/01-service-accounts.yaml
          kubectl apply -f infrastructure/k8s/base/02-network-policies.yaml

      - name: Deploy ingress
        run: |
          kubectl apply -f infrastructure/k8s/ingress/

      - name: Deploy auth service
        run: |
          kubectl set image deployment/auth-service auth-service=${{ env.REGISTRY }}/auth-service:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Deploy user service
        run: |
          kubectl set image deployment/user-service user-service=${{ env.REGISTRY }}/user-service:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Deploy wallet service
        run: |
          kubectl set image deployment/wallet-service wallet-service=${{ env.REGISTRY }}/wallet-service:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Deploy gateway
        run: |
          kubectl set image deployment/gateway-player gateway=${{ env.REGISTRY }}/gateway-player:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Deploy websocket gateway
        run: |
          kubectl set image deployment/websocket-gateway websocket-gateway=${{ env.REGISTRY }}/websocket-gateway:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/auth-service -n game_engine --timeout=300s
          kubectl rollout status deployment/user-service -n game_engine --timeout=300s
          kubectl rollout status deployment/wallet-service -n game_engine --timeout=300s
          kubectl rollout status deployment/gateway-player -n game_engine --timeout=300s
          kubectl rollout status deployment/websocket-gateway -n game_engine --timeout=300s

      - name: Verify pods are running
        run: |
          kubectl get pods -n game_engine

      - name: Run smoke tests
        run: |
          sleep 10
          kubectl exec -n game_engine deploy/gateway-player -- curl -f http://localhost:8080/health || exit 1

      - name: Post deployment status
        run: |
          echo "Deployment completed successfully to staging"

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback != 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production')
    environment: 
      name: production
      url: https://game_engine.local
      deployment_history:
        - url: https://game_engine.local
    needs: [build-and-scan, deploy-staging]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: tag
        run: |
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${{ needs.build-and-scan.outputs.version }}
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Create deployment namespace
        run: |
          kubectl create namespace game_engine --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace game-services --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy base configurations
        run: |
          kubectl apply -f infrastructure/k8s/base/00-namespaces.yaml
          kubectl apply -f infrastructure/k8s/base/01-service-accounts.yaml
          kubectl apply -f infrastructure/k8s/base/02-network-policies.yaml

      - name: Deploy ingress
        run: |
          kubectl apply -f infrastructure/k8s/ingress/

      - name: Deploy auth service
        run: |
          kubectl set image deployment/auth-service auth-service=${{ env.REGISTRY }}/auth-service:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Deploy user service
        run: |
          kubectl set image deployment/user-service user-service=${{ env.REGISTRY }}/user-service:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Deploy wallet service
        run: |
          kubectl set image deployment/wallet-service wallet-service=${{ env.REGISTRY }}/wallet-service:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Deploy gateway
        run: |
          kubectl set image deployment/gateway-player gateway=${{ env.REGISTRY }}/gateway-player:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Deploy websocket gateway
        run: |
          kubectl set image deployment/websocket-gateway websocket-gateway=${{ env.REGISTRY }}/websocket-gateway:${{ needs.build-and-scan.outputs.version }} -n game_engine

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/auth-service -n game_engine --timeout=600s
          kubectl rollout status deployment/user-service -n game_engine --timeout=600s
          kubectl rollout status deployment/wallet-service -n game_engine --timeout=600s
          kubectl rollout status deployment/gateway-player -n game_engine --timeout=600s
          kubectl rollout status deployment/websocket-gateway -n game_engine --timeout=600s

      - name: Run smoke tests
        run: |
          sleep 10
          kubectl exec -n game_engine deploy/gateway-player -- curl -f http://localhost:8080/health || exit 1

      - name: Verify deployment
        run: |
          kubectl get pods,svc,ing -n game_engine

      - name: Create deployment record
        run: |
          kubectl annotate deployment/auth-service -n game_engine kubernetes.io/change-cause="Deployed ${{ needs.build-and-scan.outputs.version }} at $(date)" --overwrite
          kubectl annotate deployment/user-service -n game_engine kubernetes.io/change-cause="Deployed ${{ needs.build-and-scan.outputs.version }} at $(date)" --overwrite
          kubectl annotate deployment/wallet-service -n game_engine kubernetes.io/change-cause="Deployed ${{ needs.build-and-scan.outputs.version }} at $(date)" --overwrite
          kubectl annotate deployment/gateway-player -n game_engine kubernetes.io/change-cause="Deployed ${{ needs.build-and-scan.outputs.version }} at $(date)" --overwrite
          kubectl annotate deployment/websocket-gateway -n game_engine kubernetes.io/change-cause="Deployed ${{ needs.build-and-scan.outputs.version }} at $(date)" --overwrite

  # ===========================================================================
  # Rollback
  # ===========================================================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback == 'true'
    environment: 
      name: production
      url: https://game_engine.local
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Get previous deployment
        id: previous
        run: |
          PREV_VERSION=$(kubectl rollout history deployment/auth-service -n game_engine | grep -v 'REVISION' | grep -v '^
 | head -1 | awk '{print $1}')
          echo "Previous version: $PREV_VERSION"
          echo "previous_version=$PREV_VERSION" >> $GITHUB_OUTPUT

      - name: Rollback deployments
        run: |
          if [ -z "${{ github.event.inputs.service }}" ]; then
            kubectl rollout undo deployment/auth-service -n game_engine
            kubectl rollout undo deployment/user-service -n game_engine
            kubectl rollout undo deployment/wallet-service -n game_engine
            kubectl rollout undo deployment/gateway-player -n game_engine
            kubectl rollout undo deployment/websocket-gateway -n game_engine
          else
            kubectl rollout undo deployment/${{ github.event.inputs.service }} -n game_engine
          fi

      - name: Wait for rollback
        run: |
          kubectl rollout status deployment/auth-service -n game_engine --timeout=300s
          kubectl rollout status deployment/user-service -n game_engine --timeout=300s
          kubectl rollout status deployment/wallet-service -n game_engine --timeout=300s
          kubectl rollout status deployment/gateway-player -n game_engine --timeout=300s
          kubectl rollout status deployment/websocket-gateway -n game_engine --timeout=300s

      - name: Verify rollback
        run: |
          kubectl get pods -n game_engine

  # ===========================================================================
  # Health Check
  # ===========================================================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, rollback]
    if: always()
    steps:
      - name: Wait for services to be ready
        run: |
          sleep 30
          echo "All deployments completed"

      - name: Final status
        run: |
          echo "Deployment workflow completed successfully"
