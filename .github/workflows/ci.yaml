# =============================================================================
# GitHub Actions: Continuous Integration
# =============================================================================
# Lint, test, and build for all services

name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '**/*.ex'
      - '**/*.exs'
      - '**/mix.exs'
      - '**/mix.lock'
      - 'proto/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '**/*.ex'
      - '**/*.exs'
      - '**/mix.exs'
      - '**/mix.lock'
      - 'proto/**'
      - '.github/workflows/ci.yaml'

env:
  REGISTRY: registry.game-engine.local:5000
  GO_VERSION: '1.21'
  ELIXIR_VERSION: '1.15'
  OTP_VERSION: '26'

jobs:
  # ===========================================================================
  # Lint
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: Run go fmt check
        run: |
          gofmt -l -w .
          git diff --exit-code

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code

  # ===========================================================================
  # Elixir Lint
  # ===========================================================================
  lint-elixir:
    name: Elixir Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache Elixir dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.mix
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/websocket-gateway/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: |
          cd services/websocket-gateway
          mix deps.get

      - name: Run mix credo
        run: |
          cd services/websocket-gateway
          mix credo --strict

      - name: Check formatting
        run: |
          cd services/websocket-gateway
          mix format --check-formatted

      - name: Run dialycer
        run: |
          cd services/websocket-gateway
          mix dialyzer || true

  # ===========================================================================
  # Unit Tests
  # ===========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run protobuf code generation
        run: make proto

      - name: Run tests
        run: make test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: coverage
          path: coverage/coverage.out

  # ===========================================================================
  # Elixir Unit Tests
  # ===========================================================================
  test-elixir:
    name: Elixir Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: websocket_gateway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache Elixir dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.mix
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/websocket-gateway/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: |
          cd services/websocket-gateway
          mix deps.get

      - name: Run tests
        run: |
          cd services/websocket-gateway
          MIX_ENV=test mix test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/websocket_gateway_test?sslmode=disable
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: coverage-elixir
          path: services/websocket-gateway/coverage/

  # ===========================================================================
  # Build
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, lint-elixir, test, test-elixir]
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - wallet-service
          - game-registry
          - gateway-player
          - gateway-admin
          - gateway-merchant
          - gateway-agent
          - websocket-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.service != 'websocket-gateway'
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Elixir
        if: matrix.service == 'websocket-gateway'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache Go modules
        if: matrix.service != 'websocket-gateway'
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Elixir dependencies
        if: matrix.service == 'websocket-gateway'
        uses: actions/cache@v3
        with:
          path: |
            ~/.mix
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/websocket-gateway/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Build ${{ matrix.service }}
        if: matrix.service != 'websocket-gateway'
        run: make build SERVICE=${{ matrix.service }}

      - name: Install Elixir dependencies
        if: matrix.service == 'websocket-gateway'
        run: |
          cd services/websocket-gateway
          mix deps.get

      - name: Build Elixir project
        if: matrix.service == 'websocket-gateway'
        run: |
          cd services/websocket-gateway
          MIX_ENV=prod mix release

      - name: Build Docker image (Go services)
        if: matrix.service != 'websocket-gateway'
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.${{ matrix.service }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest \
            .

      - name: Build Docker image (Elixir services)
        if: matrix.service == 'websocket-gateway'
        run: |
          docker build \
            -f services/websocket-gateway/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest \
            services/websocket-gateway

      - name: Push to registry (if on main)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:latest

  # ===========================================================================
  # Security Scan
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run GoSec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

      - name: Upload GoSec results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'gosec-results.sarif'

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: 'detect --source . --report-format sarif --exit-code 0'
        env:
          GITLEAKS_ENABLE_COMMENTS: true

      - name: Upload Gitleaks results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: gitleaks-results
          path: gitleaks-results.sarif

  # ===========================================================================
  # Docker Build (all services) - Multi-platform
  # ===========================================================================
  docker-build:
    name: Docker Build All
    runs-on: ubuntu-latest
    needs: [lint, lint-elixir, test, test-elixir, security]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-build-0.12.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Go services (multi-platform)
        run: |
          for service in auth-service user-service wallet-service game-registry gateway-player gateway-admin gateway-merchant gateway-agent; do
            docker buildx build \
              -f infrastructure/docker/Dockerfile.$service \
              -t ${{ env.REGISTRY }}/$service:${{ github.sha }} \
              -t ${{ env.REGISTRY }}/$service:latest \
              --platform linux/amd64,linux/arm64 \
              --push \
              .
          done

      - name: Build and push Elixir services (multi-platform)
        run: |
          docker buildx build \
            -f services/websocket-gateway/Dockerfile \
            -t ${{ env.REGISTRY }}/websocket-gateway:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/websocket-gateway:latest \
            --platform linux/amd64,linux/arm64 \
            --push \
            services/websocket-gateway

      - name: Create and push manifest
        run: |
          docker manifest create ${{ env.REGISTRY }}/game-engine:latest \
            ${{ env.REGISTRY }}/auth-service:${{ github.sha }} \
            ${{ env.REGISTRY }}/user-service:${{ github.sha }} \
            ${{ env.REGISTRY }}/wallet-service:${{ github.sha }} \
            ${{ env.REGISTRY }}/game-registry:${{ github.sha }} \
            ${{ env.REGISTRY }}/gateway-player:${{ github.sha }} \
            ${{ env.REGISTRY }}/websocket-gateway:${{ github.sha }}

          docker manifest push ${{ env.REGISTRY }}/game-engine:latest
