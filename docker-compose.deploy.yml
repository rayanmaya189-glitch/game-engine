version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: game-engine-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: game123
      POSTGRES_DB: game_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: game-engine-redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nats:
    image: nats:2.10-alpine
    container_name: game-engine-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - app-network

  auth-service:
    image: game-engine/auth-service:latest
    container_name: game-engine-auth-service
    environment:
      - SERVICE_NAME=auth-service
      - SERVER_GRPC_PORT=9001
      - SERVER_HTTP_PORT=8001
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=game123
      - DATABASE_NAME=auth_service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URLS=nats://nats:4222
      - JWT_PRIVATE_KEY_PATH=/certs/tls.key
      - JWT_PUBLIC_KEY_PATH=/certs/tls.crt
    ports:
      - "8001:8001"
      - "9001:9001"
    volumes:
      - ./certs:/certs:ro
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
